# HorizontalPodAutoscalers for the high-traffic services (CPU-based, 2→10). Requires
# metrics-server. Other stateless services run at the fixed replicas in services.yaml; the
# conveyor-sniffer is intentionally NOT autoscaled (single instance — see adapters.yaml).
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: gateway
  namespace: openwcs
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: gateway
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
