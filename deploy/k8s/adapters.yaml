---
# conveyor-sniffer — SINGLE REPLICA ONLY.
# It accepts a long-lived TCP telegram stream per conveyor controller on SNIFFER_LISTEN; round-robin
# load balancing across replicas would fragment telegrams. Pinned to replicas: 1 with a Recreate
# strategy (never two at once). To scale sniffing, run one Deployment per controller/site with its own
# SNIFFER_LISTEN + ALLOWED_IPS, or front it with a session-affinity (sticky) L4 load balancer.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: adapter-conveyor-sniffer
  namespace: openwcs
  labels: { app: adapter-conveyor-sniffer }
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels: { app: adapter-conveyor-sniffer }
  template:
    metadata:
      labels: { app: adapter-conveyor-sniffer }
    spec:
      containers:
        - name: adapter-conveyor-sniffer
          image: REGISTRY/openwcs-adapter-conveyor-sniffer:TAG
          env:
            - { name: PORT, value: "9095" }              # HTTP health
            - { name: SNIFFER_LISTEN, value: ":9200" }   # raw TCP telegram stream from the controller
            - { name: WCS_OBSERVATIONS_URL, value: "http://flow-orchestrator:8085/api/flow/conveyor/observations" }
            # - { name: WAREHOUSE_ID, value: "<uuid>" }
            # - { name: ALLOWED_IPS, value: "10.0.0.10,10.0.0.11" }  # CSV; empty = accept any source
          ports:
            - { containerPort: 9095, name: http }
            - { containerPort: 9200, name: telegram }
          readinessProbe:
            httpGet: { path: /readyz, port: 9095 }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /healthz, port: 9095 }
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests: { cpu: "100m", memory: "64Mi" }
            limits: { memory: "128Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: adapter-conveyor-sniffer
  namespace: openwcs
spec:
  selector: { app: adapter-conveyor-sniffer }
  ports:
    - { name: http, port: 9095, targetPort: 9095 }
    - { name: telegram, port: 9200, targetPort: 9200 }
