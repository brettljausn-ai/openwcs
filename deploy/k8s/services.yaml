# Deployment + Service for every Java service. Stateless request paths → safe to replicate;
# relays/schedulers are guarded by ShedLock and the loop-capacity race is fixed (see README.md).
# Set the image registry/tag before applying (REGISTRY/TAG).
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: openwcs
  labels: { app: gateway }
spec:
  replicas: 2
  selector:
    matchLabels: { app: gateway }
  template:
    metadata:
      labels: { app: gateway }
    spec:
      containers:
        - name: gateway
          image: REGISTRY/openwcs-gateway:TAG
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef: { name: openwcs-config }
            - secretRef: { name: openwcs-db }
          readinessProbe:
            httpGet: { path: /actuator/health, port: 8080 }
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /actuator/health, port: 8080 }
            initialDelaySeconds: 45
            periodSeconds: 15
          resources:
            requests: { cpu: "250m", memory: "512Mi" }
            limits: { memory: "1Gi" }
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: openwcs
spec:
  selector: { app: gateway }
  ports:
    - port: 8080
      targetPort: 8080
