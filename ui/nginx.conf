# Serves the built SPA over HTTPS and proxies API calls to the gateway, mirroring
# the Vite dev proxy ('/api' -> gateway). In the compose network the gateway is
# reachable as `gateway:8080`; override with the GATEWAY_URL build/runtime arg if
# you front a different gateway.
#
# TLS: the container forces HTTPS — port 80 301-redirects to 443, and 443 serves
# the SPA + proxies over the TLS edge. Upstream proxying to gateway/keycloak stays
# plain HTTP on the internal compose network (fine; not exposed). The cert/key are
# provided by docker-entrypoint.sh at /etc/nginx/tls/{tls.crt,tls.key} — either a
# mounted real cert or an auto-generated self-signed one. (Keep this path in sync
# with TLS_CERT_DIR's default in docker-entrypoint.sh.)

# HTTP -> HTTPS redirect. $host preserves the IP/hostname the user typed.
# Exception: serve the Let's Encrypt ACME HTTP-01 challenge over plain HTTP from the
# shared webroot so certs can be issued/renewed without downtime (scripts/issue-cert.sh).
server {
    listen 80;
    server_name _;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    ssl_certificate     /etc/nginx/tls/tls.crt;
    ssl_certificate_key /etc/nginx/tls/tls.key;

    # Sane modern TLS. No HSTS by default: with the out-of-the-box self-signed
    # cert, HSTS would let a single accepted exception lock users out. To enable
    # it (only once you serve a real cert), add e.g.
    #   add_header Strict-Transport-Security "max-age=63072000" always;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # API gateway — keep the /api prefix (no trailing slash on proxy_pass).
    location /api/ {
        proxy_pass http://gateway:8080;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Gateway actuator — the Settings → System status card reads /actuator/health
    # directly (the gateway permits /actuator/** even when edge security is on). Must
    # be proxied like /api/, otherwise it falls through to the SPA and returns HTML.
    location /actuator/ {
        proxy_pass http://gateway:8080;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Keycloak — same-origin so the login page can do the password grant and the
    # User Management screen can call the admin API without CORS. /realms = token +
    # OIDC endpoints, /admin = admin REST API, /resources = Keycloak's own assets.
    location ~ ^/(realms|admin|resources)/ {
        proxy_pass http://keycloak:8080;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback — let client-side routing handle unknown paths.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
