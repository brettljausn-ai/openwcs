# Serves the built SPA and proxies API calls to the gateway, mirroring the
# Vite dev proxy ('/api' -> gateway). In the compose network the gateway is
# reachable as `gateway:8080`; override with the GATEWAY_URL build/runtime arg
# if you front a different gateway.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # API gateway — keep the /api prefix (no trailing slash on proxy_pass).
    location /api/ {
        proxy_pass http://gateway:8080;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Keycloak — same-origin so the login page can do the password grant and the
    # User Management screen can call the admin API without CORS. /realms = token +
    # OIDC endpoints, /admin = admin REST API, /resources = Keycloak's own assets.
    location ~ ^/(realms|admin|resources)/ {
        proxy_pass http://keycloak:8080;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback — let client-side routing handle unknown paths.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
