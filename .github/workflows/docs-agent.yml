name: Docs agent

# After every change merges to main, a Claude Code agent reviews the diff and keeps the
# user-facing documentation in sync: in-repo docs + the public marketing site (opened as a PR,
# since main is protected) and the GitHub wiki (pushed directly). See scripts/docs-agent.sh.
#
# Setup: add ONE auth secret — either ANTHROPIC_API_KEY (Anthropic API billing) or
# CLAUDE_CODE_OAUTH_TOKEN (a Claude Pro/Max subscription token from `claude setup-token`).
# Without one the job fails fast. See docs/DOCS-AGENT.md.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write       # push the docs branch + the wiki
  pull-requests: write  # open the docs PR

concurrency:
  group: docs-agent
  cancel-in-progress: false

jobs:
  sync-docs:
    # Skip the agent's own commits (the [docs-agent] marker) so it never re-triggers itself.
    if: ${{ !contains(github.event.head_commit.message, '[docs-agent]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # need HEAD~1 to diff the merged change

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Run docs agent
        env:
          # Provide ONE of these (see docs/DOCS-AGENT.md). The unused one stays empty.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/docs-agent.sh
