name: Docs agent (daily)

# Once a day a Claude Code agent reviews the last 24h of commits on `main`, brings the in-repo
# user-facing docs in sync — README.md, docs/, and the public/ marketing site — and commits the
# result directly back to `main`. The GitHub wiki is a separate repo and is synced after each merge
# by docs-wiki.yml. See scripts/docs-agent.sh + docs/DOCS-AGENT.md.
#
# Setup: add ONE auth secret — ANTHROPIC_API_KEY (API billing) or CLAUDE_CODE_OAUTH_TOKEN (a Claude
# Pro/Max token from `claude setup-token`). PUSH NOTE: this job pushes directly to the protected
# `main` branch, so it needs DOCS_AGENT_TOKEN — a PAT/App token (repo `contents: write`) whose
# identity is allowed to BYPASS the guardMain ruleset. The default GITHUB_TOKEN cannot push to a
# protected branch, so it is only a non-functional fallback for unprotected forks.
on:
  schedule:
    - cron: '0 23 * * *'   # 23:00 UTC daily
  workflow_dispatch:

permissions:
  contents: write       # push the docs commit to main

concurrency:
  group: docs-agent
  cancel-in-progress: false

jobs:
  sync-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0          # need history to diff the last 24h of commits
          token: ${{ secrets.DOCS_AGENT_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Run docs agent (daily mode)
        env:
          # Provide ONE of these (see docs/DOCS-AGENT.md). The unused one stays empty.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GH_TOKEN: ${{ secrets.DOCS_AGENT_TOKEN || secrets.GITHUB_TOKEN }}
        run: bash scripts/docs-agent.sh
