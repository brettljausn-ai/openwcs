name: Deploy demo

# Manual redeploy of the demo server (Actions tab → Deploy demo → Run workflow).
#
# The demo box deploys itself via the openwcs-deploy.timer systemd unit
# (deploy/README.md, Option A): it polls origin/main every 2 minutes and runs
# deploy.sh on change. This workflow is the push-based alternative (Option B);
# it needs a self-hosted runner registered ON the demo box. While no runner is
# registered an automatic trigger would just queue forever and be superseded
# by every newer merge (an endless queued/cancelled trail in Actions), so the
# workflow_run trigger stays off until a runner exists. To switch to
# push-based deploys: register the runner (deploy/README.md §2 Option B),
# re-add the workflow_run trigger below, and disable the timer on the box.
#
#  workflow_run:
#    workflows: ["CI"]
#    types: [completed]
#    branches: [main]
on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: demo-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: [self-hosted]
    steps:
      - name: Pull, rebuild and recompose
        run: /opt/openwcs/scripts/deploy.sh
