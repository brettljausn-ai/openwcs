name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  java:
    name: Java build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
      # ubuntu-latest provides Docker, so the Testcontainers (PostgreSQL 16) tests run.
      - name: Build & test
        run: ./gradlew build --no-daemon --stacktrace
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: '**/build/reports/tests/**'
          if-no-files-found: ignore

  go:
    name: Go adapters
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: false
      - name: Build & vet adapters
        run: |
          set -euo pipefail
          for dir in services/adapters/*/; do
            echo "== $dir =="
            ( cd "$dir" && go build ./... && go vet ./... && go test ./... )
          done

  ui:
    name: UI build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install & build
        run: |
          npm install
          npm run build

  contracts:
    name: OpenAPI validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Validate OpenAPI specs
        # Structural validation (schema + $ref resolution), not opinionated style linting.
        run: |
          set -euo pipefail
          for spec in contracts/openapi/*.yaml; do
            echo "== $spec =="
            npx --yes @apidevtools/swagger-cli@4 validate "$spec"
          done
