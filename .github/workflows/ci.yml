name: CI

on:
  # Feature branches are covered by their pull_request run; only build the push event on main
  # (post-merge) so a PR branch doesn't run CI twice (once for the push, once for the PR).
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  java:
    name: Java build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
      # ubuntu-latest provides Docker, so the Testcontainers (PostgreSQL 16) tests run.
      - name: Build & test
        run: ./gradlew build --no-daemon --stacktrace --continue
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: '**/build/reports/tests/**'
          if-no-files-found: ignore

  go:
    name: Go adapters
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: false
      - name: Build & vet adapters
        run: |
          set -euo pipefail
          for dir in services/adapters/*/; do
            echo "== $dir =="
            ( cd "$dir" && go build ./... && go vet ./... && go test ./... )
          done

  ui:
    name: UI build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install & build
        run: |
          npm install
          npm run build

  contracts:
    name: OpenAPI validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Validate OpenAPI specs
        # Structural validation (schema + $ref resolution), not opinionated style linting.
        run: |
          set -euo pipefail
          for spec in contracts/openapi/*.yaml; do
            echo "== $spec =="
            npx --yes @apidevtools/swagger-cli@4 validate "$spec"
          done

  # CodeQL replaces the repository's "default setup" code scanning so the security + code-quality
  # analysis runs inside this CI run instead of as separate workflow runs. build-mode: none means it
  # analyses source directly — it does NOT re-run the Gradle/Go builds the jobs above already do.
  codeql:
    name: CodeQL (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        # `queries: code-quality` adds the code-quality pack on top of the default security queries,
        # so both run in this one job (Actions has no quality pack, so it runs security only).
        include:
          - { language: actions,               queries: '' }
          - { language: go,                    queries: 'code-quality' }
          - { language: java-kotlin,           queries: 'code-quality' }
          - { language: javascript-typescript, queries: 'code-quality' }
    steps:
      - uses: actions/checkout@v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: none
          queries: ${{ matrix.queries }}
      - name: Analyze
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
