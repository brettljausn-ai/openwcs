name: Docs agent (wiki)

# After a change merges to main, a Claude Code agent syncs the GitHub WIKI (a separate repo that
# cannot be part of a PR). The in-repo docs are already kept current inside each PR by docs-agent.yml,
# so this job only touches the wiki. See scripts/docs-wiki.sh + docs/DOCS-AGENT.md.
#
# Setup: add ONE auth secret — ANTHROPIC_API_KEY or CLAUDE_CODE_OAUTH_TOKEN (see docs/DOCS-AGENT.md).
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write       # push the wiki repo

concurrency:
  group: docs-wiki
  cancel-in-progress: false

jobs:
  sync-wiki:
    # Skip the agent's own commits (the [docs-agent] marker) so it never re-triggers itself.
    if: ${{ !contains(github.event.head_commit.message, '[docs-agent]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # need HEAD~1 to diff the merged change

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Run wiki sync
        env:
          # Provide ONE of these (see docs/DOCS-AGENT.md). The unused one stays empty.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/docs-wiki.sh
