# openwcs local platform.
#   Infra only:   docker compose -f platform/docker-compose.yml up
#   Infra + apps: docker compose -f platform/docker-compose.yml --profile apps up --build
#
# App images must be built first (Java: ./gradlew bootJar; Go: built in-Dockerfile).
name: openwcs

services:
  postgres:
    restart: unless-stopped
    image: postgres:16
    # The stack runs ~13 Java services, each with its own HikariCP pool (≈10 connections),
    # which blows past Postgres's default max_connections=100 — services that start last get
    # "FATAL: sorry, too many clients already" and crash-loop (Flyway can't connect). Raise the
    # ceiling so the whole fleet (plus Flyway + headroom) fits; ~300 slots is well within the box.
    command: ["postgres", "-c", "max_connections=300"]
    environment:
      POSTGRES_USER: openwcs
      POSTGRES_PASSWORD: openwcs
      POSTGRES_DB: openwcs
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]

  zookeeper:
    restart: unless-stopped
    image: confluentinc/cp-zookeeper:7.6.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  kafka:
    restart: unless-stopped
    image: confluentinc/cp-kafka:7.6.1
    depends_on: [zookeeper]
    ports: ["9092:9092"]
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  schema-registry:
    restart: unless-stopped
    image: confluentinc/cp-schema-registry:7.6.1
    depends_on: [kafka]
    ports: ["8181:8081"]   # 8181 on host — flow-orchestrator owns 8085
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:29092

  keycloak:
    restart: unless-stopped
    image: quay.io/keycloak/keycloak:25.0
    # Imports the openWCS realm (roles ADMIN/SUPERVISOR/OPERATOR/VIEWER + demo users)
    # from keycloak/openwcs-realm.json on startup.
    command: ["start-dev", "--import-realm"]
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports: ["8180:8080"]
    volumes:
      - ./keycloak:/opt/keycloak/data/import:ro


  gateway:
    restart: unless-stopped
    profiles: ["apps"]
    build: ../gateway
    ports: ["8080:8080"]
    depends_on: [postgres, kafka, keycloak]
    environment:
      # Route to services by their compose hostnames (overrides the localhost defaults).
      OPENWCS_URI_MASTER_DATA: http://master-data:8081
      OPENWCS_URI_INVENTORY: http://inventory:8082
      OPENWCS_URI_ALLOCATION: http://allocation:8091
      OPENWCS_URI_PROCESS_ENGINE: http://process-engine:8083
      OPENWCS_URI_ORDER_MANAGEMENT: http://order-management:8084
      OPENWCS_URI_FLOW_ORCHESTRATOR: http://flow-orchestrator:8085
      OPENWCS_URI_TXLOG: http://txlog:8086
      OPENWCS_URI_IAM: http://iam:8087
      OPENWCS_URI_NOTIFICATION: http://notification:8088
      OPENWCS_URI_INTEGRATION_SAP: http://integration-sap:8089
      OPENWCS_URI_INTEGRATION_MANHATTAN: http://integration-manhattan:8090
      OPENWCS_URI_INTEGRATION_HOST: http://integration-host:8092
      OPENWCS_URI_SLOTTING: http://slotting:8093
      OPENWCS_URI_GTP: http://gtp:8094
      OPENWCS_URI_COUNTING: http://counting:8095
      # Go device adapters — reached by the System info aggregator (GET /api/system/services).
      OPENWCS_URI_CONVEYOR_ADAPTER: http://conveyor-adapter:9091
      OPENWCS_URI_AMR_GEEKPLUS_ADAPTER: http://amr-geekplus-adapter:9093
      OPENWCS_URI_AUTOSTORE_ADAPTER: http://autostore-adapter:9094
      OPENWCS_URI_CONVEYOR_SNIFFER: http://conveyor-sniffer:9095
      OPENWCS_URI_ASRS_ADAPTER: http://asrs-adapter:9096
      OPENWCS_URI_EQUIPMENT_EMULATOR: http://equipment-emulator:9097
      # Edge auth: the gateway is the trust boundary — it requires a valid Keycloak JWT on
      # every /api/** call and forwards X-Auth-User/X-Auth-Roles downstream. We validate by
      # signature (jwk-set-uri) rather than issuer-uri so tokens minted via the nginx proxy
      # validate regardless of the public hostname. Internal service-to-service calls are
      # unaffected (only the gateway enforces).
      OPENWCS_SECURITY_ENABLED: "true"
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8080/realms/openwcs/protocol/openid-connect/certs
    volumes:
      # Shared per-service daily log files: the gateway writes its OWN log here (like every service)
      # AND reads the others to serve them on the System info screen (GET /api/system/services/{name}/logs).
      - openwcs-logs:/var/log/openwcs

  master-data:
    restart: unless-stopped
    profiles: ["apps"]
    volumes:
      - openwcs-logs:/var/log/openwcs
    build: ../services/master-data
    ports: ["8081:8081"]
    depends_on: [postgres, kafka]
    environment:
      # master-data owns the `master_data` schema in the shared DB (build.md §5.1).
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/openwcs
      SPRING_DATASOURCE_USERNAME: openwcs
      SPRING_DATASOURCE_PASSWORD: openwcs

  inventory:
    restart: unless-stopped
    profiles: ["apps"]
    volumes:
      - openwcs-logs:/var/log/openwcs
    build: ../services/inventory
    ports: ["8082:8082"]
    depends_on: [postgres, kafka]
    environment:
      # Service-local store; dev uses an isolated `inventory` schema (build.md §4.2).
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/openwcs
      SPRING_DATASOURCE_USERNAME: openwcs
      SPRING_DATASOURCE_PASSWORD: openwcs
      # Consumes the streamed transaction log to project stock (build.md §9).
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092

  process-engine:
    restart: unless-stopped
    profiles: ["apps"]
    volumes:
      - openwcs-logs:/var/log/openwcs
    build: ../services/process-engine
    ports: ["8083:8083"]
    depends_on: [postgres, kafka]
    environment:
      # Flowable BPMN engine manages its own ACT_* tables in the shared DB; service tasks
      # originate WCS work via flow-orchestrator.
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/openwcs
      SPRING_DATASOURCE_USERNAME: openwcs
      SPRING_DATASOURCE_PASSWORD: openwcs
      OPENWCS_FLOW_ORCHESTRATOR_BASE_URL: http://flow-orchestrator:8085
      OPENWCS_ORDER_MANAGEMENT_BASE_URL: http://order-management:8084
      OPENWCS_ALLOCATION_BASE_URL: http://allocation:8091
      OPENWCS_SLOTTING_BASE_URL: http://slotting:8093

  order-management:
    restart: unless-stopped
    profiles: ["apps"]
    volumes:
      - openwcs-logs:/var/log/openwcs
    build: ../services/order-management
    ports: ["8084:8084"]
    depends_on: [postgres, kafka]
    environment:
      # Service-local `orders` schema; delegates allocation to the allocation service (ADR 0002)
      # and appends line stock transactions to the transaction log.
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/openwcs
      SPRING_DATASOURCE_USERNAME: openwcs
      SPRING_DATASOURCE_PASSWORD: openwcs
      OPENWCS_ALLOCATION_BASE_URL: http://allocation:8091
      OPENWCS_TXLOG_BASE_URL: http://txlog:8086
      OPENWCS_MASTER_DATA_BASE_URL: http://master-data:8081

  allocation:
    restart: unless-stopped
    profiles: ["apps"]
    volumes:
      - openwcs-logs:/var/log/openwcs
    build: ../services/allocation
    ports: ["8091:8091"]
    depends_on: [postgres, kafka]
    environment:
      # Service-local `allocation` schema; calls master-data + inventory (ADR 0002).
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/openwcs
      SPRING_DATASOURCE_USERNAME: openwcs
      SPRING_DATASOURCE_PASSWORD: openwcs
      OPENWCS_MASTER_DATA_BASE_URL: http://master-data:8081
      OPENWCS_INVENTORY_BASE_URL: http://inventory:8082
      # Per-shipper dispatch-label barcodes come from the host via integration-sap (ADR 0002).
      OPENWCS_ALLOCATION_HOST_LABEL_BASE_URL: http://integration-sap:8089

  slotting:
    restart: unless-stopped
    profiles: ["apps"]
    volumes:
      - openwcs-logs:/var/log/openwcs
    build: ../services/slotting
    ports: ["8093:8093"]
    depends_on: [postgres, master-data, inventory]
    environment:
      # Service-local `slotting` schema; calls master-data (blocks/locations) + inventory (on-hand).
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/openwcs
      SPRING_DATASOURCE_USERNAME: openwcs
      SPRING_DATASOURCE_PASSWORD: openwcs
      OPENWCS_MASTER_DATA_BASE_URL: http://master-data:8081
      OPENWCS_INVENTORY_BASE_URL: http://inventory:8082
      OPENWCS_TXLOG_BASE_URL: http://txlog:8086

  gtp:
    restart: unless-stopped
    profiles: ["apps"]
    volumes:
      - openwcs-logs:/var/log/openwcs
    build: ../services/gtp
    ports: ["8094:8094"]
    depends_on: [postgres]
    environment:
      # Service-local `gtp` schema; goods-to-person station config + pick-and-put work cycles.
      # References orders/SKUs/HUs/locations by UUID (no cross-schema FKs).
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/openwcs
      SPRING_DATASOURCE_USERNAME: openwcs
      SPRING_DATASOURCE_PASSWORD: openwcs
      # Store-back transports go to flow-orchestrator; broken-product write-offs go to txlog;
      # store-back asks slotting for the best put-away location.
      OPENWCS_FLOW_ORCHESTRATOR_BASE_URL: http://flow-orchestrator:8085
      OPENWCS_TXLOG_BASE_URL: http://txlog:8086
      OPENWCS_SLOTTING_BASE_URL: http://slotting:8093

  counting:
    restart: unless-stopped
    profiles: ["apps"]
    volumes:
      - openwcs-logs:/var/log/openwcs
    build: ../services/counting
    ports: ["8095:8095"]
    depends_on: [postgres, inventory, txlog]
    environment:
      # Service-local `counting` schema; reads the inventory expected-qty snapshot and posts
      # approved variances to the transaction log as StockAdjusted (the inventory adjustment path).
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/openwcs
      SPRING_DATASOURCE_USERNAME: openwcs
      SPRING_DATASOURCE_PASSWORD: openwcs
      OPENWCS_INVENTORY_BASE_URL: http://inventory:8082
      OPENWCS_TXLOG_BASE_URL: http://txlog:8086
      # ASRS count-tote routing (emulator mode): check the emulator flag + resolve storage block/SKU
      # (master-data), request the tote retrieval (flow-orchestrator) and pin it to a GTP counting
      # station (gtp). Without these the routing silently no-ops (in-container default is localhost).
      OPENWCS_MASTER_DATA_BASE_URL: http://master-data:8081
      OPENWCS_GTP_BASE_URL: http://gtp:8094
      OPENWCS_FLOW_ORCHESTRATOR_BASE_URL: http://flow-orchestrator:8085

  flow-orchestrator:
    restart: unless-stopped
    profiles: ["apps"]
    volumes:
      - openwcs-logs:/var/log/openwcs
    build: ../services/flow-orchestrator
    ports: ["8085:8085"]
    depends_on: [postgres, kafka, conveyor-adapter, equipment-emulator]
    environment:
      # Owns the `flow` schema; dispatches device tasks to adapters over the uniform contract (build.md §8).
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/openwcs
      SPRING_DATASOURCE_USERNAME: openwcs
      SPRING_DATASOURCE_PASSWORD: openwcs
      OPENWCS_ADAPTER_CONVEYOR: http://conveyor-adapter:9091
      # Per-family device adapters so flow can dispatch ASRS/AMR/AutoStore tasks (e.g. ASRS count-tote
      # retrievals). Without these flow returns 422 "No adapter configured for family: ASRS".
      OPENWCS_ADAPTER_ASRS: http://asrs-adapter:9096
      OPENWCS_ADAPTER_AMR: http://amr-geekplus-adapter:9093
      OPENWCS_ADAPTER_AUTOSTORE: http://autostore-adapter:9094
      # When the hardware-emulator flag is ON, dispatch every family to the single equipment-emulator
      # instead of the per-family adapters above; the flag itself is read from master-data.
      OPENWCS_EMULATOR_URL: http://equipment-emulator:9097
      OPENWCS_MASTER_DATA_BASE_URL: http://master-data:8081
      # Own URL handed to the emulator as the async device-result callback target.
      OPENWCS_FLOW_SELF_BASE_URL: http://flow-orchestrator:8085
      # Project topology STOCK/ORDER interactions into GTP station nodes (best-effort on routing projection).
      OPENWCS_GTP_BASE_URL: http://gtp:8094

  txlog:
    restart: unless-stopped
    profiles: ["apps"]
    volumes:
      - openwcs-logs:/var/log/openwcs
    build: ../services/txlog
    ports: ["8086:8086"]
    depends_on: [postgres, kafka]
    environment:
      # Owns the `transaction_log` schema in the shared DB; relays it to Kafka (build.md §5.1, §5.5).
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/openwcs
      SPRING_DATASOURCE_USERNAME: openwcs
      SPRING_DATASOURCE_PASSWORD: openwcs
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092

  iam:
    restart: unless-stopped
    profiles: ["apps"]
    volumes:
      - openwcs-logs:/var/log/openwcs
    build: ../services/iam
    ports: ["8087:8087"]
    depends_on: [postgres, kafka]
    environment:
      # openWCS authorization model in its own `iam` schema (build.md §4.8).
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/openwcs
      SPRING_DATASOURCE_USERNAME: openwcs
      SPRING_DATASOURCE_PASSWORD: openwcs

  notification:
    restart: unless-stopped
    profiles: ["apps"]
    volumes:
      - openwcs-logs:/var/log/openwcs
    build: ../services/notification
    ports: ["8088:8088"]
    depends_on: [postgres, kafka]

  integration-sap:
    restart: unless-stopped
    profiles: ["apps"]
    volumes:
      - openwcs-logs:/var/log/openwcs
    build: ../services/integration-sap
    ports: ["8089:8089"]
    depends_on: [postgres, kafka, master-data, integration-host]
    environment:
      # Host gateway: label-barcode allocation + route feed upserted into the master-data catalog;
      # SAP orders/ASNs are translated into the canonical Host API.
      OPENWCS_MASTER_DATA_BASE_URL: http://master-data:8081
      OPENWCS_HOST_API_BASE_URL: http://integration-host:8092

  integration-manhattan:
    restart: unless-stopped
    profiles: ["apps"]
    volumes:
      - openwcs-logs:/var/log/openwcs
    build: ../services/integration-manhattan
    ports: ["8090:8090"]
    depends_on: [postgres, kafka, master-data, integration-host]
    environment:
      # Translate Manhattan orders/ASNs into the canonical Host API (materials → SKUs).
      OPENWCS_MASTER_DATA_BASE_URL: http://master-data:8081
      OPENWCS_HOST_API_BASE_URL: http://integration-host:8092

  integration-host:
    restart: unless-stopped
    profiles: ["apps"]
    volumes:
      - openwcs-logs:/var/log/openwcs
    build: ../services/integration-host
    ports: ["8092:8092"]
    depends_on: [postgres, order-management, txlog, master-data]
    environment:
      # Service-local `host_integration` schema (idempotency keys + webhook state).
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/openwcs
      SPRING_DATASOURCE_USERNAME: openwcs
      SPRING_DATASOURCE_PASSWORD: openwcs
      # Canonical Host API → domain services (orders in, confirmations from the txlog feed,
      # master-data SKU upserts, inventory adjustments appended to the txlog).
      OPENWCS_ORDER_MANAGEMENT_BASE_URL: http://order-management:8084
      OPENWCS_TXLOG_BASE_URL: http://txlog:8086
      OPENWCS_MASTER_DATA_BASE_URL: http://master-data:8081
      # Push confirmations to registered webhooks (poller over the txlog feed).
      OPENWCS_HOST_WEBHOOK_ENABLED: "true"

  # Go adapters stamp version metadata into the binary via ldflags. deploy.sh exports
  # OPENWCS_GIT_SHA / OPENWCS_BUILD_TIME; defaults cover a plain `docker compose build`.

  # Single emulator that simulates ALL device families. flow-orchestrator routes device tasks here
  # while the hardware-emulator flag is ON. No DB/Kafka/hardware connection — pure simulator.
  equipment-emulator:
    restart: unless-stopped
    profiles: ["apps"]
    volumes:
      - openwcs-logs:/var/log/openwcs
    build:
      context: ../services/equipment-emulator
      args:
        VERSION: "${OPENWCS_VERSION:-0.1.0-SNAPSHOT}"
        GIT_SHA: "${OPENWCS_GIT_SHA:-dev}"
        BUILD_TIME: "${OPENWCS_BUILD_TIME:-unknown}"
    ports: ["9097:9097"]
    environment:
      # Override the per-command simulated processing time (ms). Unset = realistic per-command
      # defaults; 0 = instant. Tune to speed up / slow down the simulated equipment.
      OPENWCS_EMULATOR_LATENCY_MS: "${OPENWCS_EMULATOR_LATENCY_MS:-}"
      # Fault injection: fail 1 in every N tasks (deterministic). Unset/0 = no faults. Can also be
      # toggled live via POST /config.
      OPENWCS_EMULATOR_FAULT_RATE: "${OPENWCS_EMULATOR_FAULT_RATE:-}"
      # Loop recirculation: every Nth CONVEY recirculates once before diverting, so arrival order
      # diverges from dispatch order (ADR-0007 R2). Unset/0 = none. Toggle live via POST /config.
      OPENWCS_EMULATOR_RECIRC_EVERY: "${OPENWCS_EMULATOR_RECIRC_EVERY:-}"

  conveyor-adapter:
    restart: unless-stopped
    profiles: ["apps"]
    volumes:
      - openwcs-logs:/var/log/openwcs
    build:
      context: ../services/adapters/conveyor
      args:
        VERSION: "${OPENWCS_VERSION:-0.1.0-SNAPSHOT}"
        GIT_SHA: "${OPENWCS_GIT_SHA:-dev}"
        BUILD_TIME: "${OPENWCS_BUILD_TIME:-unknown}"
    ports: ["9091:9091"]
    # No master-data/DB/Kafka dependency: emulation moved to equipment-emulator, and these adapters
    # only hold the (unimplemented) real-hardware protocol path.
    depends_on: [postgres, kafka]

  asrs-adapter:
    restart: unless-stopped
    profiles: ["apps"]
    volumes:
      - openwcs-logs:/var/log/openwcs
    build:
      context: ../services/adapters/asrs
      args:
        VERSION: "${OPENWCS_VERSION:-0.1.0-SNAPSHOT}"
        GIT_SHA: "${OPENWCS_GIT_SHA:-dev}"
        BUILD_TIME: "${OPENWCS_BUILD_TIME:-unknown}"
    ports: ["9096:9096"]   # 9096, not 9092 — Kafka owns host port 9092
    # No master-data/DB/Kafka dependency: emulation moved to equipment-emulator, and these adapters
    # only hold the (unimplemented) real-hardware protocol path.
    depends_on: [postgres, kafka]

  amr-geekplus-adapter:
    restart: unless-stopped
    profiles: ["apps"]
    volumes:
      - openwcs-logs:/var/log/openwcs
    build:
      context: ../services/adapters/amr-geekplus
      args:
        VERSION: "${OPENWCS_VERSION:-0.1.0-SNAPSHOT}"
        GIT_SHA: "${OPENWCS_GIT_SHA:-dev}"
        BUILD_TIME: "${OPENWCS_BUILD_TIME:-unknown}"
    ports: ["9093:9093"]
    # No master-data/DB/Kafka dependency: emulation moved to equipment-emulator, and these adapters
    # only hold the (unimplemented) real-hardware protocol path.
    depends_on: [postgres, kafka]

  autostore-adapter:
    restart: unless-stopped
    profiles: ["apps"]
    volumes:
      - openwcs-logs:/var/log/openwcs
    build:
      context: ../services/adapters/autostore
      args:
        VERSION: "${OPENWCS_VERSION:-0.1.0-SNAPSHOT}"
        GIT_SHA: "${OPENWCS_GIT_SHA:-dev}"
        BUILD_TIME: "${OPENWCS_BUILD_TIME:-unknown}"
    ports: ["9094:9094"]
    # No master-data/DB/Kafka dependency: emulation moved to equipment-emulator, and these adapters
    # only hold the (unimplemented) real-hardware protocol path.
    depends_on: [postgres, kafka]

  conveyor-sniffer:
    restart: unless-stopped
    profiles: ["apps"]
    volumes:
      - openwcs-logs:/var/log/openwcs
    build:
      context: ../services/adapters/conveyor-sniffer
      args:
        VERSION: "${OPENWCS_VERSION:-0.1.0-SNAPSHOT}"
        GIT_SHA: "${OPENWCS_GIT_SHA:-dev}"
        BUILD_TIME: "${OPENWCS_BUILD_TIME:-unknown}"
    ports: ["9095:9095", "9200:9200"]   # health/info, telegram ingest
    depends_on: [flow-orchestrator]
    environment:
      # Decode conveyor scan telegrams and post them to the WCS for topology learning.
      WCS_OBSERVATIONS_URL: http://flow-orchestrator:8085/api/flow/conveyor/observations
      # WAREHOUSE_ID + ALLOWED_IPS are site-specific; set per deployment.

  ui:
    restart: unless-stopped
    profiles: ["apps"]
    build: ../ui
    # HTTPS is forced: 443 serves the SPA + proxies; 80 301-redirects to 443.
    # Browse the demo at https://<host>/  (nginx proxies /api -> gateway, /realms+/admin -> keycloak).
    ports: ["80:80", "443:443"]
    depends_on: [gateway, keycloak]
    volumes:
      # TLS cert dir (host-persisted). Empty on first run -> the entrypoint self-signs
      # (one-time browser warning on a raw IP). Run scripts/issue-cert.sh <domain[,domain2,...]> <email>
      # to drop a real Let's Encrypt cert here (tls.crt/tls.key) and reload nginx.
      - ${OPENWCS_TLS_DIR:-/etc/openwcs/tls}:/etc/nginx/tls
      # ACME HTTP-01 webroot, shared with the certbot one-shot (scripts/issue-cert.sh).
      - ${OPENWCS_ACME_DIR:-/etc/openwcs/acme}:/var/www/certbot

volumes:
  pgdata:
  openwcs-logs:
