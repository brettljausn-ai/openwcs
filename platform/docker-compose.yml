# openwcs local platform.
#   Infra only:   docker compose -f platform/docker-compose.yml up
#   Infra + apps: docker compose -f platform/docker-compose.yml --profile apps up --build
#
# App images must be built first (Java: ./gradlew bootJar; Go: built in-Dockerfile).
name: openwcs

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: openwcs
      POSTGRES_PASSWORD: openwcs
      POSTGRES_DB: openwcs
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    depends_on: [zookeeper]
    ports: ["9092:9092"]
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.1
    depends_on: [kafka]
    ports: ["8085:8081"]
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:29092

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    command: ["start-dev"]
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports: ["8180:8080"]


  gateway:
    profiles: ["apps"]
    build: ../gateway
    ports: ["8080:8080"]
    depends_on: [postgres, kafka]

  master-data:
    profiles: ["apps"]
    build: ../services/master-data
    ports: ["8081:8081"]
    depends_on: [postgres, kafka]

  inventory:
    profiles: ["apps"]
    build: ../services/inventory
    ports: ["8082:8082"]
    depends_on: [postgres, kafka]

  process-engine:
    profiles: ["apps"]
    build: ../services/process-engine
    ports: ["8083:8083"]
    depends_on: [postgres, kafka]

  order-management:
    profiles: ["apps"]
    build: ../services/order-management
    ports: ["8084:8084"]
    depends_on: [postgres, kafka]

  flow-orchestrator:
    profiles: ["apps"]
    build: ../services/flow-orchestrator
    ports: ["8085:8085"]
    depends_on: [postgres, kafka]

  txlog:
    profiles: ["apps"]
    build: ../services/txlog
    ports: ["8086:8086"]
    depends_on: [postgres, kafka]

  iam:
    profiles: ["apps"]
    build: ../services/iam
    ports: ["8087:8087"]
    depends_on: [postgres, kafka]

  notification:
    profiles: ["apps"]
    build: ../services/notification
    ports: ["8088:8088"]
    depends_on: [postgres, kafka]

  integration-sap:
    profiles: ["apps"]
    build: ../services/integration-sap
    ports: ["8089:8089"]
    depends_on: [postgres, kafka]

  integration-manhattan:
    profiles: ["apps"]
    build: ../services/integration-manhattan
    ports: ["8090:8090"]
    depends_on: [postgres, kafka]

  conveyor-adapter:
    profiles: ["apps"]
    build: ../services/adapters/conveyor
    ports: ["9091:9091"]
    depends_on: [postgres, kafka]

  asrs-adapter:
    profiles: ["apps"]
    build: ../services/adapters/asrs
    ports: ["9092:9092"]
    depends_on: [postgres, kafka]

  amr-geekplus-adapter:
    profiles: ["apps"]
    build: ../services/adapters/amr-geekplus
    ports: ["9093:9093"]
    depends_on: [postgres, kafka]

  autostore-adapter:
    profiles: ["apps"]
    build: ../services/adapters/autostore
    ports: ["9094:9094"]
    depends_on: [postgres, kafka]

volumes:
  pgdata:
