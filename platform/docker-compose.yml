# openwcs local platform.
#   Infra only:   docker compose -f platform/docker-compose.yml up
#   Infra + apps: docker compose -f platform/docker-compose.yml --profile apps up --build
#
# App images must be built first (Java: ./gradlew bootJar; Go: built in-Dockerfile).
name: openwcs

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: openwcs
      POSTGRES_PASSWORD: openwcs
      POSTGRES_DB: openwcs
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    depends_on: [zookeeper]
    ports: ["9092:9092"]
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.1
    depends_on: [kafka]
    ports: ["8085:8081"]
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:29092

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    # Imports the openWCS realm (roles ADMIN/SUPERVISOR/OPERATOR/VIEWER + demo users)
    # from keycloak/openwcs-realm.json on startup.
    command: ["start-dev", "--import-realm"]
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports: ["8180:8080"]
    volumes:
      - ./keycloak:/opt/keycloak/data/import:ro


  gateway:
    profiles: ["apps"]
    build: ../gateway
    ports: ["8080:8080"]
    depends_on: [postgres, kafka]
    environment:
      # Route to services by their compose hostnames (overrides the localhost defaults).
      OPENWCS_URI_MASTER_DATA: http://master-data:8081
      OPENWCS_URI_INVENTORY: http://inventory:8082
      OPENWCS_URI_ALLOCATION: http://allocation:8091
      OPENWCS_URI_PROCESS_ENGINE: http://process-engine:8083
      OPENWCS_URI_ORDER_MANAGEMENT: http://order-management:8084
      OPENWCS_URI_FLOW_ORCHESTRATOR: http://flow-orchestrator:8085
      OPENWCS_URI_TXLOG: http://txlog:8086
      OPENWCS_URI_IAM: http://iam:8087
      OPENWCS_URI_NOTIFICATION: http://notification:8088
      OPENWCS_URI_INTEGRATION_SAP: http://integration-sap:8089
      OPENWCS_URI_INTEGRATION_MANHATTAN: http://integration-manhattan:8090
      OPENWCS_URI_INTEGRATION_HOST: http://integration-host:8092

  master-data:
    profiles: ["apps"]
    build: ../services/master-data
    ports: ["8081:8081"]
    depends_on: [postgres, kafka]
    environment:
      # master-data owns the `master_data` schema in the shared DB (build.md §5.1).
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/openwcs
      SPRING_DATASOURCE_USERNAME: openwcs
      SPRING_DATASOURCE_PASSWORD: openwcs

  inventory:
    profiles: ["apps"]
    build: ../services/inventory
    ports: ["8082:8082"]
    depends_on: [postgres, kafka]
    environment:
      # Service-local store; dev uses an isolated `inventory` schema (build.md §4.2).
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/openwcs
      SPRING_DATASOURCE_USERNAME: openwcs
      SPRING_DATASOURCE_PASSWORD: openwcs
      # Consumes the streamed transaction log to project stock (build.md §9).
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092

  process-engine:
    profiles: ["apps"]
    build: ../services/process-engine
    ports: ["8083:8083"]
    depends_on: [postgres, kafka]

  order-management:
    profiles: ["apps"]
    build: ../services/order-management
    ports: ["8084:8084"]
    depends_on: [postgres, kafka]
    environment:
      # Service-local `orders` schema; delegates allocation to the allocation service (ADR 0002)
      # and appends line stock transactions to the transaction log.
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/openwcs
      SPRING_DATASOURCE_USERNAME: openwcs
      SPRING_DATASOURCE_PASSWORD: openwcs
      OPENWCS_ALLOCATION_BASE_URL: http://allocation:8091
      OPENWCS_TXLOG_BASE_URL: http://txlog:8086
      OPENWCS_MASTER_DATA_BASE_URL: http://master-data:8081

  allocation:
    profiles: ["apps"]
    build: ../services/allocation
    ports: ["8091:8091"]
    depends_on: [postgres, kafka]
    environment:
      # Service-local `allocation` schema; calls master-data + inventory (ADR 0002).
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/openwcs
      SPRING_DATASOURCE_USERNAME: openwcs
      SPRING_DATASOURCE_PASSWORD: openwcs
      OPENWCS_MASTER_DATA_BASE_URL: http://master-data:8081
      OPENWCS_INVENTORY_BASE_URL: http://inventory:8082
      # Per-shipper dispatch-label barcodes come from the host via integration-sap (ADR 0002).
      OPENWCS_ALLOCATION_HOST_LABEL_BASE_URL: http://integration-sap:8089

  flow-orchestrator:
    profiles: ["apps"]
    build: ../services/flow-orchestrator
    ports: ["8085:8085"]
    depends_on: [postgres, kafka, conveyor-adapter]
    environment:
      # Owns the `flow` schema; dispatches device tasks to adapters over the uniform contract (build.md §8).
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/openwcs
      SPRING_DATASOURCE_USERNAME: openwcs
      SPRING_DATASOURCE_PASSWORD: openwcs
      OPENWCS_ADAPTER_CONVEYOR: http://conveyor-adapter:9091

  txlog:
    profiles: ["apps"]
    build: ../services/txlog
    ports: ["8086:8086"]
    depends_on: [postgres, kafka]
    environment:
      # Owns the `transaction_log` schema in the shared DB; relays it to Kafka (build.md §5.1, §5.5).
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/openwcs
      SPRING_DATASOURCE_USERNAME: openwcs
      SPRING_DATASOURCE_PASSWORD: openwcs
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092

  iam:
    profiles: ["apps"]
    build: ../services/iam
    ports: ["8087:8087"]
    depends_on: [postgres, kafka]
    environment:
      # openWCS authorization model in its own `iam` schema (build.md §4.8).
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/openwcs
      SPRING_DATASOURCE_USERNAME: openwcs
      SPRING_DATASOURCE_PASSWORD: openwcs

  notification:
    profiles: ["apps"]
    build: ../services/notification
    ports: ["8088:8088"]
    depends_on: [postgres, kafka]

  integration-sap:
    profiles: ["apps"]
    build: ../services/integration-sap
    ports: ["8089:8089"]
    depends_on: [postgres, kafka, master-data, integration-host]
    environment:
      # Host gateway: label-barcode allocation + route feed upserted into the master-data catalog;
      # SAP orders/ASNs are translated into the canonical Host API.
      OPENWCS_MASTER_DATA_BASE_URL: http://master-data:8081
      OPENWCS_HOST_API_BASE_URL: http://integration-host:8092

  integration-manhattan:
    profiles: ["apps"]
    build: ../services/integration-manhattan
    ports: ["8090:8090"]
    depends_on: [postgres, kafka, master-data, integration-host]
    environment:
      # Translate Manhattan orders/ASNs into the canonical Host API (materials → SKUs).
      OPENWCS_MASTER_DATA_BASE_URL: http://master-data:8081
      OPENWCS_HOST_API_BASE_URL: http://integration-host:8092

  integration-host:
    profiles: ["apps"]
    build: ../services/integration-host
    ports: ["8092:8092"]
    depends_on: [postgres, order-management, txlog, master-data]
    environment:
      # Service-local `host_integration` schema (idempotency keys + webhook state).
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/openwcs
      SPRING_DATASOURCE_USERNAME: openwcs
      SPRING_DATASOURCE_PASSWORD: openwcs
      # Canonical Host API → domain services (orders in, confirmations from the txlog feed,
      # master-data SKU upserts, inventory adjustments appended to the txlog).
      OPENWCS_ORDER_MANAGEMENT_BASE_URL: http://order-management:8084
      OPENWCS_TXLOG_BASE_URL: http://txlog:8086
      OPENWCS_MASTER_DATA_BASE_URL: http://master-data:8081
      # Push confirmations to registered webhooks (poller over the txlog feed).
      OPENWCS_HOST_WEBHOOK_ENABLED: "true"

  conveyor-adapter:
    profiles: ["apps"]
    build: ../services/adapters/conveyor
    ports: ["9091:9091"]
    depends_on: [postgres, kafka]

  asrs-adapter:
    profiles: ["apps"]
    build: ../services/adapters/asrs
    ports: ["9092:9092"]
    depends_on: [postgres, kafka]

  amr-geekplus-adapter:
    profiles: ["apps"]
    build: ../services/adapters/amr-geekplus
    ports: ["9093:9093"]
    depends_on: [postgres, kafka]

  autostore-adapter:
    profiles: ["apps"]
    build: ../services/adapters/autostore
    ports: ["9094:9094"]
    depends_on: [postgres, kafka]

volumes:
  pgdata:
