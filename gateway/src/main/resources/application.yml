server:
  port: 8080
spring:
  application:
    name: gateway
  cloud:
    gateway:
      routes:
        # Service URIs default to localhost (host-run dev); override per env (e.g. compose
        # sets http://master-data:8081). See platform/docker-compose.yml.
        - id: master-data
          uri: ${OPENWCS_URI_MASTER_DATA:http://localhost:8081}
          predicates: [ "Path=/api/master-data/**" ]
        - id: inventory
          uri: ${OPENWCS_URI_INVENTORY:http://localhost:8082}
          predicates: [ "Path=/api/inventory/**" ]
        - id: allocation
          uri: ${OPENWCS_URI_ALLOCATION:http://localhost:8091}
          predicates: [ "Path=/api/allocation/**" ]
        - id: slotting
          uri: ${OPENWCS_URI_SLOTTING:http://localhost:8093}
          predicates: [ "Path=/api/slotting/**" ]
        - id: gtp
          uri: ${OPENWCS_URI_GTP:http://localhost:8094}
          predicates: [ "Path=/api/gtp/**" ]
        - id: process-engine
          uri: ${OPENWCS_URI_PROCESS_ENGINE:http://localhost:8083}
          predicates: [ "Path=/api/process/**" ]
        - id: order-management
          uri: ${OPENWCS_URI_ORDER_MANAGEMENT:http://localhost:8084}
          predicates: [ "Path=/api/orders/**" ]
        - id: flow-orchestrator
          uri: ${OPENWCS_URI_FLOW_ORCHESTRATOR:http://localhost:8085}
          predicates: [ "Path=/api/flow/**" ]
        - id: txlog
          uri: ${OPENWCS_URI_TXLOG:http://localhost:8086}
          predicates: [ "Path=/api/txlog/**" ]
        - id: iam
          uri: ${OPENWCS_URI_IAM:http://localhost:8087}
          predicates: [ "Path=/api/iam/**" ]
        - id: notification
          uri: ${OPENWCS_URI_NOTIFICATION:http://localhost:8088}
          predicates: [ "Path=/api/notification/**" ]
        - id: integration-sap
          uri: ${OPENWCS_URI_INTEGRATION_SAP:http://localhost:8089}
          predicates: [ "Path=/api/integration/sap/**" ]
        - id: integration-manhattan
          uri: ${OPENWCS_URI_INTEGRATION_MANHATTAN:http://localhost:8090}
          predicates: [ "Path=/api/integration/manhattan/**" ]
        - id: integration-host
          uri: ${OPENWCS_URI_INTEGRATION_HOST:http://localhost:8092}
          predicates: [ "Path=/api/host/**" ]

# Edge security (build.md §4.8, §12). Off by default so the stack runs without a realm.
# To enable JWT validation, set OPENWCS_SECURITY_ENABLED=true AND point the resource server
# at the Keycloak realm, e.g.
#   SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI=http://localhost:8180/realms/openwcs
# The gateway then validates the JWT and forwards X-Auth-User / X-Auth-Roles downstream.
openwcs:
  security:
    enabled: ${OPENWCS_SECURITY_ENABLED:false}

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
