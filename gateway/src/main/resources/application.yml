server:
  port: 8080
spring:
  application:
    name: gateway
  cloud:
    gateway:
      routes:
        - id: master-data
          uri: http://localhost:8081
          predicates: [ "Path=/api/master-data/**" ]
        - id: inventory
          uri: http://localhost:8082
          predicates: [ "Path=/api/inventory/**" ]
        - id: process-engine
          uri: http://localhost:8083
          predicates: [ "Path=/api/process/**" ]
        - id: order-management
          uri: http://localhost:8084
          predicates: [ "Path=/api/orders/**" ]
        - id: flow-orchestrator
          uri: http://localhost:8085
          predicates: [ "Path=/api/flow/**" ]
        - id: txlog
          uri: http://localhost:8086
          predicates: [ "Path=/api/txlog/**" ]
        - id: iam
          uri: http://localhost:8087
          predicates: [ "Path=/api/iam/**" ]
        - id: notification
          uri: http://localhost:8088
          predicates: [ "Path=/api/notification/**" ]
        - id: integration-sap
          uri: http://localhost:8089
          predicates: [ "Path=/api/integration/sap/**" ]
        - id: integration-manhattan
          uri: http://localhost:8090
          predicates: [ "Path=/api/integration/manhattan/**" ]
management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
