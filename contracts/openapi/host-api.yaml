openapi: 3.0.3
info:
  title: openWCS Host API
  version: 0.1.0
  description: >
    The canonical, vendor-neutral integration API any host system (WMS/ERP) uses to drive
    openWCS: push outbound orders and ASNs in, pull confirmations out. Vendor adapters
    (integration-sap / integration-manhattan) translate their native protocols into this API,
    so a host integrates against one stable contract. Confirmations are a cursor feed over the
    transaction log now; webhook push is a planned follow-up. All POSTs accept an optional
    `Idempotency-Key` header — repeating a key replays the original response instead of
    re-processing (safe retries).
servers:
  - url: /api/host
    description: Via the API gateway

tags:
  - name: Orders
  - name: Confirmations
  - name: MasterData
  - name: Inventory
  - name: Webhooks

paths:
  /webhooks:
    get:
      tags: [Webhooks]
      summary: List webhook subscriptions
      operationId: listWebhooks
      responses:
        "200":
          description: Subscriptions
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/WebhookSubscription' }
    post:
      tags: [Webhooks]
      summary: Register a webhook (push confirmations to a callback URL)
      operationId: registerWebhook
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [callbackUrl]
              properties:
                callbackUrl: { type: string, format: uri }
      responses:
        "200":
          description: Created subscription
          content:
            application/json:
              schema: { $ref: '#/components/schemas/WebhookSubscription' }
  /webhooks/{id}:
    delete:
      tags: [Webhooks]
      summary: Deactivate a webhook subscription
      operationId: deactivateWebhook
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204": { description: Deactivated }
  /masterdata/skus:
    post:
      tags: [MasterData]
      summary: Upsert a list of SKUs (host-driven master-data sync)
      description: >
        The host pushes a list of SKUs, each carrying its unit-of-measure hierarchy and barcodes
        inline. Intra-SKU references are by code (a UoM names its parent by parentCode, a barcode
        names its packaging level by uomCode). This is an upsert, not a full-catalog replace: SKUs
        absent from the batch are left untouched. Within a synced SKU the host is authoritative over
        its nested data, so that SKU's UoM and barcode lists fully replace what is stored for it
        (omitted UoMs/barcodes are removed). The whole batch is applied in one transaction.
      operationId: upsertHostSkus
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items: { $ref: '#/components/schemas/HostSku' }
      responses:
        "200":
          description: Sync report
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SkuSyncReport' }
        "400": { description: Invalid request }
  /inventory/adjustments:
    post:
      tags: [Inventory]
      summary: Post a stock adjustment (signed delta)
      description: Emitted as a StockAdjusted event to the transaction log; the inventory projection applies it.
      operationId: postInventoryAdjustment
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/InventoryAdjustment' }
      responses:
        "200":
          description: Appended event identifiers
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Appended' }
        "400": { description: Invalid request }
  /orders:
    post:
      tags: [Orders]
      summary: Create an outbound order
      operationId: createHostOrder
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateHostOrder' }
      responses:
        "200":
          description: Created order identifiers
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CreatedOrder' }
        "400": { description: Invalid request }
  /asns:
    post:
      tags: [Orders]
      summary: Create an ASN (expected receipt → inbound order)
      operationId: createHostAsn
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateAsn' }
      responses:
        "200":
          description: Created order identifiers
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CreatedOrder' }
        "400": { description: Invalid request }
  /confirmations:
    get:
      tags: [Confirmations]
      summary: Pull confirmations since a cursor
      description: >
        Returns transaction-log events after the cursor (receipts, picks, shipments, stock
        changes) and the nextCursor to use next time. An order dispatch yields an
        OrderShipped confirmation whose payload reports the ordered vs actually shipped qty
        per line (shortShipped=true and shippedQty below orderedQty when the order was short
        allocated and shipped short).
      operationId: getConfirmations
      parameters:
        - name: cursor
          in: query
          schema: { type: integer, format: int64, default: 0 }
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 1000, default: 100 }
      responses:
        "200":
          description: A page of confirmations
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ConfirmationPage' }

components:
  schemas:
    CreateHostOrder:
      type: object
      required: [orderRef, warehouseId, lines]
      properties:
        orderRef: { type: string }
        warehouseId: { type: string, format: uuid }
        customerRef: { type: string, nullable: true }
        priority: { type: integer, nullable: true }
        dispatchBy: { type: string, format: date-time, nullable: true }
        serviceCode: { type: string, nullable: true }
        routeCode: { type: string, nullable: true }
        labelTemplateCode: { type: string, nullable: true }
        shipTo: { $ref: '#/components/schemas/ShipTo' }
        lines:
          type: array
          items: { $ref: '#/components/schemas/OrderLine' }
    CreateAsn:
      type: object
      required: [asnRef, warehouseId, lines]
      properties:
        asnRef: { type: string }
        warehouseId: { type: string, format: uuid }
        supplierRef: { type: string, nullable: true }
        lines:
          type: array
          items: { $ref: '#/components/schemas/OrderLine' }
    OrderLine:
      type: object
      required: [skuId, qty]
      properties:
        skuId: { type: string, format: uuid }
        qty: { type: number }
    ShipTo:
      type: object
      nullable: true
      properties:
        name: { type: string }
        line1: { type: string }
        line2: { type: string }
        city: { type: string }
        region: { type: string }
        postcode: { type: string }
        country: { type: string }
        contact: { type: string }
        phone: { type: string }
    CreatedOrder:
      type: object
      properties:
        id: { type: string }
        orderRef: { type: string }
        status: { type: string }
    Confirmation:
      type: object
      properties:
        cursor: { type: integer, format: int64, description: This event's global position. }
        type: { type: string, example: Picked, description: "e.g. GoodsReceived, Picked, StockAdjusted, OrderShipped." }
        reference: { type: string, description: Aggregate id (order/HU); the order reference for OrderShipped. }
        occurredAt: { type: string, format: date-time }
        actor: { type: string, nullable: true }
        payload:
          type: object
          additionalProperties: true
          description: >
            Event-specific body. OrderShipped carries warehouseId, orderRef, shortShipped and
            lines[] each with lineNo, skuId, orderedQty, shippedQty and shortQty, so a short
            ship is visible per line.
    ConfirmationPage:
      type: object
      properties:
        confirmations:
          type: array
          items: { $ref: '#/components/schemas/Confirmation' }
        nextCursor: { type: integer, format: int64 }
    HostSku:
      type: object
      required: [code]
      properties:
        code: { type: string }
        description: { type: string, nullable: true }
        ownerClient: { type: string, nullable: true }
        batchTracked: { type: boolean, nullable: true }
        serialTracked: { type: boolean, nullable: true }
        dateTracked: { type: boolean, nullable: true }
        uoms:
          type: array
          nullable: true
          description: The SKU's unit-of-measure hierarchy. Authoritative — fully replaces stored UoMs.
          items: { $ref: '#/components/schemas/HostUom' }
        barcodes:
          type: array
          nullable: true
          description: The SKU's barcodes. Authoritative — fully replaces stored barcodes.
          items: { $ref: '#/components/schemas/HostBarcode' }
    HostUom:
      type: object
      required: [code]
      properties:
        code: { type: string, description: "Packaging level code, e.g. EACH, INNER, CASE, PALLET." }
        parentCode: { type: string, nullable: true, description: "Parent UoM code in the hierarchy." }
        qtyInParent: { type: number, nullable: true, description: "How many of this UoM make one parent." }
        lengthMm: { type: number, nullable: true }
        widthMm: { type: number, nullable: true }
        heightMm: { type: number, nullable: true }
        weightG: { type: number, nullable: true }
        baseUnit: { type: boolean, nullable: true, description: "True for the smallest stockable unit." }
    HostBarcode:
      type: object
      required: [value]
      properties:
        value: { type: string }
        uomCode: { type: string, nullable: true, description: "Packaging level (UoM code) this barcode identifies." }
        type: { type: string, nullable: true, description: "Barcode type name, e.g. EAN13, GTIN14, GS1-128." }
    SkuSyncReport:
      type: object
      properties:
        received: { type: integer }
        created: { type: integer }
        updated: { type: integer }
        results:
          type: array
          items: { $ref: '#/components/schemas/SkuSyncResult' }
    SkuSyncResult:
      type: object
      properties:
        code: { type: string }
        action: { type: string, enum: [CREATED, UPDATED] }
        uoms: { type: integer, description: "Number of UoMs stored for the SKU after sync." }
        barcodes: { type: integer, description: "Number of barcodes stored for the SKU after sync." }
    InventoryAdjustment:
      type: object
      required: [warehouseId, skuId, qtyDelta]
      properties:
        warehouseId: { type: string, format: uuid }
        skuId: { type: string, format: uuid }
        locationId: { type: string, format: uuid, nullable: true }
        qtyDelta: { type: number, description: Signed delta (negative to reduce). }
        uomCode: { type: string, nullable: true }
        status: { type: string, nullable: true }
        reason: { type: string, nullable: true }
    Appended:
      type: object
      properties:
        eventId: { type: string }
        position: { type: integer, format: int64 }
    WebhookSubscription:
      type: object
      properties:
        id: { type: string, format: uuid }
        callbackUrl: { type: string, format: uri }
        cursor: { type: integer, format: int64, description: Last global position delivered. }
        active: { type: boolean }
