openapi: 3.0.3
info:
  title: openWCS Master Data API
  version: 0.1.0
  description: >
    Authoritative catalog for the automated area (build.md §4.1, §6): warehouses,
    SKUs (global core) + per-warehouse SkuProfile overlays, attribute schemas,
    dangerous goods, units of measure (bundle hierarchy), barcodes & barcode types,
    locations/topology, handling-unit types, and equipment.

    Master data is multi-warehouse: the SKU carries only stable, global identity;
    everything site-variable lives in a per-warehouse SkuProfile whose JSONB metadata
    is validated against an admin-defined AttributeSchema.
servers:
  - url: /api/master-data
    description: Via the API gateway (build.md §3)

tags:
  - name: Warehouses
  - name: SKUs
  - name: SkuProfiles
  - name: AttributeSchemas
  - name: DangerousGoods
  - name: UnitsOfMeasure
  - name: Barcodes
  - name: BarcodeTypes
  - name: Locations
  - name: HandlingUnitTypes
  - name: Equipment
  - name: Dispatch

paths:
  # ---------------------------------------------------------------- Hardware emulator mode
  /emulator:
    get:
      tags: [Equipment]
      summary: Hardware emulator mode status
      description: >
        Global flag. When ON, the device adapters simulate all equipment and never connect to
        physical hardware; when OFF, the adapters use the real connection path. Defaults OFF. The
        Go adapters poll this endpoint to learn the current value.
      operationId: getEmulatorStatus
      responses:
        "200":
          description: Emulator status
          content:
            application/json:
              schema: { $ref: '#/components/schemas/EmulatorStatus' }
    # enable/disable are admin-only writes (X-Auth-Roles must contain ADMIN).
  /emulator/enable:
    post:
      tags: [Equipment]
      summary: Turn hardware emulator mode ON (admin-only)
      operationId: enableEmulator
      responses:
        "200":
          description: Emulator status
          content:
            application/json:
              schema: { $ref: '#/components/schemas/EmulatorStatus' }
        "403": { description: Not an ADMIN }
  /emulator/disable:
    post:
      tags: [Equipment]
      summary: Turn hardware emulator mode OFF (admin-only)
      operationId: disableEmulator
      responses:
        "200":
          description: Emulator status
          content:
            application/json:
              schema: { $ref: '#/components/schemas/EmulatorStatus' }
        "403": { description: Not an ADMIN }
  # ---------------------------------------------------------------- Stock rules
  /stock-rules:
    get:
      tags: [Equipment]
      summary: Stock integrity rule states
      description: >
        Global integrity toggles read by the flows that fill handling units. Single SKU per
        compartment (default ON): one HU compartment holds exactly one SKU, so an HU never
        carries more distinct SKUs than its type has compartments. GTP decanting enforces it
        while ON.
      operationId: getStockRules
      responses:
        "200":
          description: Stock rule states
          content:
            application/json:
              schema: { $ref: '#/components/schemas/StockRules' }
  /stock-rules/single-sku-per-compartment/enable:
    post:
      tags: [Equipment]
      summary: Turn the single-SKU-per-compartment rule ON (admin-only)
      operationId: enableSingleSkuPerCompartment
      responses:
        "200":
          description: Stock rule states
          content:
            application/json:
              schema: { $ref: '#/components/schemas/StockRules' }
        "403": { description: Not an ADMIN }
  /stock-rules/single-sku-per-compartment/disable:
    post:
      tags: [Equipment]
      summary: Turn the single-SKU-per-compartment rule OFF (admin-only)
      operationId: disableSingleSkuPerCompartment
      responses:
        "200":
          description: Stock rule states
          content:
            application/json:
              schema: { $ref: '#/components/schemas/StockRules' }
        "403": { description: Not an ADMIN }
  # ---------------------------------------------------------------- Warehouses
  /warehouses:
    get:
      tags: [Warehouses]
      summary: List warehouses
      operationId: listWarehouses
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
        - name: status
          in: query
          schema: { type: string, example: ACTIVE }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WarehousePage'
    post:
      tags: [Warehouses]
      summary: Create a warehouse
      operationId: createWarehouse
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Warehouse' }
      responses:
        "201":
          description: Created
          headers:
            Location: { $ref: '#/components/headers/Location' }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Warehouse' }
        "409": { $ref: '#/components/responses/Conflict' }
        "422": { $ref: '#/components/responses/ValidationError' }
  /warehouses/{warehouseId}:
    parameters:
      - $ref: '#/components/parameters/WarehouseId'
    get:
      tags: [Warehouses]
      summary: Get a warehouse
      operationId: getWarehouse
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Warehouse' }
        "404": { $ref: '#/components/responses/NotFound' }
    put:
      tags: [Warehouses]
      summary: Update a warehouse
      operationId: updateWarehouse
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Warehouse' }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Warehouse' }
        "404": { $ref: '#/components/responses/NotFound' }
        "409": { $ref: '#/components/responses/Conflict' }
        "422": { $ref: '#/components/responses/ValidationError' }
    delete:
      tags: [Warehouses]
      summary: Archive a warehouse
      operationId: deleteWarehouse
      responses:
        "204": { description: Archived }
        "404": { $ref: '#/components/responses/NotFound' }

  # ---------------------------------------------------------------------- SKUs
  /skus:
    get:
      tags: [SKUs]
      summary: List / search SKUs
      operationId: listSkus
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
        - name: code
          in: query
          description: Exact SKU code.
          schema: { type: string }
        - name: q
          in: query
          description: Free-text match on code/description.
          schema: { type: string }
        - name: ownerClient
          in: query
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SkuPage' }
    post:
      tags: [SKUs]
      summary: Create a SKU (host-sync only)
      description: >
        SKUs are host-owned master data (build.md §6, §16). This write is reserved for the host-sync
        ingestion path; interactive (gateway-routed) callers are rejected with 403. Read-only in the WCS.
      operationId: createSku
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Sku' }
      responses:
        "201":
          description: Created
          headers:
            Location: { $ref: '#/components/headers/Location' }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Sku' }
        "403": { $ref: '#/components/responses/HostManaged' }
        "409": { $ref: '#/components/responses/Conflict' }
        "422": { $ref: '#/components/responses/ValidationError' }
  /skus/import:
    post:
      tags: [SKUs]
      summary: Bulk import SKUs (host-sync only)
      description: >
        Bulk catalog load from the host (build.md §4.1). SKUs are host-owned master data
        (build.md §6, §16): this is reserved for the host-sync ingestion path; interactive
        (gateway-routed) callers are rejected with 403. Accepts a JSON array of SKUs or a CSV
        upload; rows are validated and applied, returning a per-row result report.
      operationId: importSkus
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items: { $ref: '#/components/schemas/Sku' }
          text/csv:
            schema: { type: string, format: binary }
      responses:
        "200":
          description: Import report
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BulkImportReport' }
        "403": { $ref: '#/components/responses/HostManaged' }
        "422": { $ref: '#/components/responses/ValidationError' }
  /skus/sync:
    post:
      tags: [SKUs]
      summary: Sync a list of SKUs with nested UoMs and barcodes (host-sync only)
      description: >
        Host-driven sync of SKUs that carry their unit-of-measure hierarchy and barcodes inline
        (build.md §6, §16). Each SKU is upserted by code; intra-SKU references are by code (a UoM
        names its parent by parentCode, a barcode names its packaging level by uomCode). This is an
        upsert, not a full-catalog replace: SKUs absent from the batch are left untouched (never
        removed). Within a synced SKU, the host is authoritative over its nested data, so that SKU's
        stored UoMs/barcodes absent from the payload are removed and the rest upserted. UoMs are
        matched by (sku, code) so their ids (and any stock referencing them) survive a re-sync. The
        whole batch runs in one transaction. SKUs are host-owned master data: interactive
        (gateway-routed) callers are rejected with 403; only the header-less host-sync path may write.
      operationId: syncSkus
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items: { $ref: '#/components/schemas/SkuSyncRequest' }
      responses:
        "200":
          description: Sync report
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SkuSyncReport' }
        "403": { $ref: '#/components/responses/HostManaged' }
        "422": { $ref: '#/components/responses/ValidationError' }
  /skus/{skuId}:
    parameters:
      - $ref: '#/components/parameters/SkuId'
    get:
      tags: [SKUs]
      summary: Get a SKU
      operationId: getSku
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Sku' }
        "404": { $ref: '#/components/responses/NotFound' }
    put:
      tags: [SKUs]
      summary: Update a SKU (host-sync only)
      description: >
        SKUs are host-owned master data (build.md §6, §16). This write is reserved for the host-sync
        ingestion path; interactive (gateway-routed) callers are rejected with 403. Read-only in the WCS.
      operationId: updateSku
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Sku' }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Sku' }
        "403": { $ref: '#/components/responses/HostManaged' }
        "404": { $ref: '#/components/responses/NotFound' }
        "409": { $ref: '#/components/responses/Conflict' }
        "422": { $ref: '#/components/responses/ValidationError' }
    delete:
      tags: [SKUs]
      summary: Archive a SKU (host-sync only)
      description: >
        SKUs are host-owned master data (build.md §6, §16). This write is reserved for the host-sync
        ingestion path; interactive (gateway-routed) callers are rejected with 403. Read-only in the WCS.
      operationId: deleteSku
      responses:
        "204": { description: Archived }
        "403": { $ref: '#/components/responses/HostManaged' }
        "404": { $ref: '#/components/responses/NotFound' }

  # ---------------------------------------------------------- SKU sub-resources
  /skus/{skuId}/card:
    parameters:
      - $ref: '#/components/parameters/SkuId'
    get:
      tags: [SKUs]
      summary: One-call product card (identity + base-UoM dimensions + profile metadata)
      description: >
        Lightweight read for operator screens (e.g. the GTP tote panel): the SKU's code,
        description and image plus its base unit-of-measure dimensions/weight and, when a
        warehouse is given, the sku_profile metadata for that warehouse. Read-only convenience
        over existing data; same catalog-read RBAC as the other SKU GETs.
      operationId: getSkuCard
      parameters:
        - name: warehouseId
          in: query
          schema: { type: string, format: uuid }
          description: Warehouse whose profile metadata to include (omitted = empty metadata).
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SkuCard' }
        "404": { $ref: '#/components/responses/NotFound' }
  /skus/{skuId}/profiles:
    parameters:
      - $ref: '#/components/parameters/SkuId'
    get:
      tags: [SkuProfiles]
      summary: List a SKU's per-warehouse profiles
      operationId: listSkuProfiles
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/SkuProfile' }
    put:
      tags: [SkuProfiles]
      summary: Upsert the SKU's profile for a warehouse
      description: >
        Creates or replaces the (sku, warehouse) overlay. The `metadata` blob is
        validated against the referenced AttributeSchema before being stored (§6).
      operationId: upsertSkuProfile
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SkuProfile' }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SkuProfile' }
        "404": { $ref: '#/components/responses/NotFound' }
        "422": { $ref: '#/components/responses/ValidationError' }
  /skus/{skuId}/uoms:
    parameters:
      - $ref: '#/components/parameters/SkuId'
    get:
      tags: [UnitsOfMeasure]
      summary: List the SKU's units of measure (bundle hierarchy)
      operationId: listUoms
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/UnitOfMeasure' }
    post:
      tags: [UnitsOfMeasure]
      summary: Add a unit of measure (host-sync only)
      description: >
        Units of measure are host-owned master data (build.md §6, §16). This write is reserved for the
        host-sync ingestion path; interactive (gateway-routed) callers are rejected with 403. Read-only
        in the WCS.
      operationId: createUom
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UnitOfMeasure' }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UnitOfMeasure' }
        "403": { $ref: '#/components/responses/HostManaged' }
        "409": { $ref: '#/components/responses/Conflict' }
        "422": { $ref: '#/components/responses/ValidationError' }
  /skus/{skuId}/barcodes:
    parameters:
      - $ref: '#/components/parameters/SkuId'
    get:
      tags: [Barcodes]
      summary: List the SKU's barcodes
      operationId: listSkuBarcodes
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Barcode' }
    post:
      tags: [Barcodes]
      summary: Register a barcode for the SKU (host-sync only)
      description: >
        Barcodes are host-owned master data (build.md §6, §16). This write is reserved for the host-sync
        ingestion path; interactive (gateway-routed) callers are rejected with 403. Read-only in the WCS.
      operationId: createBarcode
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Barcode' }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Barcode' }
        "403": { $ref: '#/components/responses/HostManaged' }
        "409": { $ref: '#/components/responses/Conflict' }
        "422": { $ref: '#/components/responses/ValidationError' }
  /skus/{skuId}/dangerous-goods:
    parameters:
      - $ref: '#/components/parameters/SkuId'
    get:
      tags: [DangerousGoods]
      summary: Get the SKU's dangerous-goods classification
      operationId: getDangerousGoods
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DangerousGoods' }
        "404": { $ref: '#/components/responses/NotFound' }
    put:
      tags: [DangerousGoods]
      summary: Set / replace the SKU's dangerous-goods classification
      operationId: putDangerousGoods
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/DangerousGoods' }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DangerousGoods' }
        "422": { $ref: '#/components/responses/ValidationError' }
    delete:
      tags: [DangerousGoods]
      summary: Clear the SKU's dangerous-goods classification
      operationId: deleteDangerousGoods
      responses:
        "204": { description: Cleared }
        "404": { $ref: '#/components/responses/NotFound' }

  # ----------------------------------------------------------- AttributeSchemas
  /attribute-schemas:
    get:
      tags: [AttributeSchemas]
      summary: List attribute schemas
      operationId: listAttributeSchemas
      parameters:
        - name: warehouseId
          in: query
          schema: { type: string, format: uuid }
        - name: appliesTo
          in: query
          schema: { $ref: '#/components/schemas/AttributeScope' }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/AttributeSchema' }
    post:
      tags: [AttributeSchemas]
      summary: Publish a new attribute-schema version
      operationId: createAttributeSchema
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AttributeSchema' }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AttributeSchema' }
        "409": { $ref: '#/components/responses/Conflict' }
        "422": { $ref: '#/components/responses/ValidationError' }
  /attribute-schemas/{attributeSchemaId}:
    parameters:
      - name: attributeSchemaId
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [AttributeSchemas]
      summary: Get an attribute schema
      operationId: getAttributeSchema
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AttributeSchema' }
        "404": { $ref: '#/components/responses/NotFound' }

  # --------------------------------------------------------------- BarcodeTypes
  /barcode-types:
    get:
      tags: [BarcodeTypes]
      summary: List barcode types
      operationId: listBarcodeTypes
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/BarcodeType' }
    post:
      tags: [BarcodeTypes]
      summary: Create a barcode type
      operationId: createBarcodeType
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/BarcodeType' }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BarcodeType' }
        "409": { $ref: '#/components/responses/Conflict' }

  # -------------------------------------------------------------- Barcode lookup
  /barcodes:
    get:
      tags: [Barcodes]
      summary: Resolve a scanned barcode value
      description: >
        Look up barcodes by value (used at goods-in / picking to identify a SKU and
        packaging level). The barcode type drives parsing/validation (e.g. GS1-128).
      operationId: findBarcodes
      parameters:
        - name: value
          in: query
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Barcode' }
  /barcodes/{barcodeId}:
    parameters:
      - name: barcodeId
        in: path
        required: true
        schema: { type: string, format: uuid }
    delete:
      tags: [Barcodes]
      summary: Remove a barcode (host-sync only)
      description: >
        Barcodes are host-owned master data (build.md §6, §16). This write is reserved for the host-sync
        ingestion path; interactive (gateway-routed) callers are rejected with 403. Read-only in the WCS.
      operationId: deleteBarcode
      responses:
        "204": { description: Removed }
        "403": { $ref: '#/components/responses/HostManaged' }
        "404": { $ref: '#/components/responses/NotFound' }

  # ------------------------------------------------------------------ Locations
  /locations:
    get:
      tags: [Locations]
      summary: List / search locations
      operationId: listLocations
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
        - name: warehouseId
          in: query
          required: true
          schema: { type: string, format: uuid }
        - name: purpose
          in: query
          schema: { $ref: '#/components/schemas/LocationPurpose' }
        - name: locationType
          in: query
          schema: { $ref: '#/components/schemas/LocationType' }
        - name: parentId
          in: query
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LocationPage' }
    post:
      tags: [Locations]
      summary: Create a location
      operationId: createLocation
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Location' }
      responses:
        "201":
          description: Created
          headers:
            Location: { $ref: '#/components/headers/Location' }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Location' }
        "409": { $ref: '#/components/responses/Conflict' }
        "422": { $ref: '#/components/responses/ValidationError' }
  /locations/operational:
    get:
      tags: [Locations]
      summary: Resolve the operational location for equipment / a workplace / UNKNOWN (lazily created)
      description: >
        HUs are always booked to a real location: each conveyor and each workplace automatically
        has a location carrying its name, and an HU whose position is not known books to the
        warehouse's UNKNOWN location (the inventory service bars that stock from allocation).
        This resolves that location, creating it on first use. Idempotent: concurrent first calls
        return the same row (unique warehouse_id + code). Mapping: EQUIPMENT = CONVEYOR_SEGMENT /
        TRANSPORT, WORKPLACE = STATION / STAGING, UNKNOWN = FREE_SPACE / QUARANTINE (code UNKNOWN,
        name omitted). All created ACTIVE and unblocked.
      operationId: getOperationalLocation
      parameters:
        - name: warehouseId
          in: query
          required: true
          schema: { type: string, format: uuid }
        - name: kind
          in: query
          required: true
          schema: { type: string, enum: [EQUIPMENT, WORKPLACE, UNKNOWN] }
        - name: name
          in: query
          description: The equipment / workplace name; becomes the location code. Omitted for UNKNOWN.
          schema: { type: string }
      responses:
        "200":
          description: The operational location (pre-existing or just created)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Location' }
        "400": { $ref: '#/components/responses/BadRequest' }
  /locations/{locationId}:
    parameters:
      - name: locationId
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [Locations]
      summary: Get a location
      operationId: getLocation
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Location' }
        "404": { $ref: '#/components/responses/NotFound' }
    put:
      tags: [Locations]
      summary: Update a location
      operationId: updateLocation
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Location' }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Location' }
        "404": { $ref: '#/components/responses/NotFound' }
        "409": { $ref: '#/components/responses/Conflict' }
        "422": { $ref: '#/components/responses/ValidationError' }
    delete:
      tags: [Locations]
      summary: Archive a location
      operationId: deleteLocation
      responses:
        "204": { description: Archived }
        "404": { $ref: '#/components/responses/NotFound' }

  # ----------------------------------------------------------- HandlingUnitTypes
  /handling-unit-types:
    get:
      tags: [HandlingUnitTypes]
      summary: List handling-unit types
      operationId: listHandlingUnitTypes
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/HandlingUnitType' }
    post:
      tags: [HandlingUnitTypes]
      summary: Create a handling-unit type
      operationId: createHandlingUnitType
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/HandlingUnitType' }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/HandlingUnitType' }
        "409": { $ref: '#/components/responses/Conflict' }

  # ------------------------------------------------------------------ Equipment
  /equipment:
    get:
      tags: [Equipment]
      summary: List equipment
      operationId: listEquipment
      parameters:
        - name: warehouseId
          in: query
          required: true
          schema: { type: string, format: uuid }
        - name: family
          in: query
          schema: { $ref: '#/components/schemas/EquipmentFamily' }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Equipment' }
    post:
      tags: [Equipment]
      summary: Register a piece of equipment
      operationId: createEquipment
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Equipment' }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Equipment' }
        "409": { $ref: '#/components/responses/Conflict' }
        "422": { $ref: '#/components/responses/ValidationError' }
  /equipment/{equipmentId}:
    parameters:
      - name: equipmentId
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [Equipment]
      summary: Get equipment
      operationId: getEquipment
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Equipment' }
        "404": { $ref: '#/components/responses/NotFound' }
    put:
      tags: [Equipment]
      summary: Update equipment
      operationId: updateEquipment
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Equipment' }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Equipment' }
        "404": { $ref: '#/components/responses/NotFound' }

  /shipping-services:
    get:
      tags: [Dispatch]
      summary: List shipping services (optionally look up by code)
      operationId: listShippingServices
      parameters:
        - name: code
          in: query
          required: false
          schema: { type: string }
          description: If given, returns the single service with this code (or empty).
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { type: array, items: { $ref: '#/components/schemas/ShippingService' } }
    post:
      tags: [Dispatch]
      summary: Create a shipping service
      operationId: createShippingService
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ShippingService' }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ShippingService' }
  /shipping-services/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [Dispatch]
      summary: Get a shipping service
      operationId: getShippingService
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ShippingService' }
        "404": { $ref: '#/components/responses/NotFound' }
    put:
      tags: [Dispatch]
      summary: Update a shipping service
      operationId: updateShippingService
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ShippingService' }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ShippingService' }
        "404": { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [Dispatch]
      summary: Archive a shipping service
      operationId: deleteShippingService
      responses:
        "204": { description: Archived }
        "404": { $ref: '#/components/responses/NotFound' }

  /routes:
    get:
      tags: [Dispatch]
      summary: List routes (optionally look up by code)
      operationId: listRoutes
      parameters:
        - name: code
          in: query
          required: false
          schema: { type: string }
          description: If given, returns the single route with this code (or empty).
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { type: array, items: { $ref: '#/components/schemas/Route' } }
    post:
      tags: [Dispatch]
      summary: Create a route
      description: Routes are normally fed from a host system; this also allows manual entry.
      operationId: createRoute
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Route' }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Route' }
  /routes/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [Dispatch]
      summary: Get a route
      operationId: getRoute
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Route' }
        "404": { $ref: '#/components/responses/NotFound' }
    put:
      tags: [Dispatch]
      summary: Update a route
      operationId: updateRoute
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Route' }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Route' }
        "404": { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [Dispatch]
      summary: Archive a route
      operationId: deleteRoute
      responses:
        "204": { description: Archived }
        "404": { $ref: '#/components/responses/NotFound' }

  /label-templates:
    get:
      tags: [Dispatch]
      summary: List label templates (optionally look up by code)
      operationId: listLabelTemplates
      parameters:
        - name: code
          in: query
          required: false
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { type: array, items: { $ref: '#/components/schemas/LabelTemplate' } }
    post:
      tags: [Dispatch]
      summary: Create a label template (designed in the admin UI)
      operationId: createLabelTemplate
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LabelTemplate' }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LabelTemplate' }
  /label-templates/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [Dispatch]
      summary: Get a label template
      operationId: getLabelTemplate
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LabelTemplate' }
        "404": { $ref: '#/components/responses/NotFound' }
    put:
      tags: [Dispatch]
      summary: Update a label template
      operationId: updateLabelTemplate
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LabelTemplate' }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LabelTemplate' }
        "404": { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [Dispatch]
      summary: Archive a label template
      operationId: deleteLabelTemplate
      responses:
        "204": { description: Archived }
        "404": { $ref: '#/components/responses/NotFound' }
  /label-templates/{id}/render:
    post:
      tags: [Dispatch]
      summary: Render a label template to a print payload
      description: Renders the template with the supplied field values to ZPL (default) or PDF, returned as base64.
      operationId: renderLabelTemplate
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RenderLabelRequest' }
      responses:
        "200":
          description: Rendered label
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RenderedLabel' }
        "400": { description: Unsupported format }
        "404": { $ref: '#/components/responses/NotFound' }

components:
  parameters:
    Page:
      name: page
      in: query
      description: Zero-based page index.
      schema: { type: integer, minimum: 0, default: 0 }
    Size:
      name: size
      in: query
      description: Page size.
      schema: { type: integer, minimum: 1, maximum: 500, default: 50 }
    WarehouseId:
      name: warehouseId
      in: path
      required: true
      schema: { type: string, format: uuid }
    SkuId:
      name: skuId
      in: path
      required: true
      schema: { type: string, format: uuid }

  headers:
    Location:
      description: URI of the created resource.
      schema: { type: string, format: uri }

  responses:
    BadRequest:
      description: Malformed request (e.g. an unsupported operational-location kind or a missing name)
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
    NotFound:
      description: Resource not found
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
    Conflict:
      description: Conflict (e.g. duplicate code / version mismatch)
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
    ValidationError:
      description: Request failed validation (incl. AttributeSchema validation)
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
    HostManaged:
      description: >
        Forbidden — the target is host-owned master data (SKU, unit-of-measure or barcode) and is
        read-only on the interactive surface. Returned when an interactive (gateway-routed) caller
        attempts a write; only the host-sync ingestion path may upsert these (build.md §6, §16).
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }

  schemas:
    EmulatorStatus:
      type: object
      properties:
        enabled: { type: boolean, description: True when the system runs against simulated hardware. }
    StockRules:
      type: object
      description: Global stock integrity rule states.
      properties:
        singleSkuPerCompartment:
          type: boolean
          description: One HU compartment holds exactly one SKU (default true).
      required: [singleSkuPerCompartment]
    # --------------------------------------------------------------- Enumerations
    LifecycleStatus:
      type: string
      enum: [ACTIVE, INACTIVE, ARCHIVED]
      default: ACTIVE
    AttributeScope:
      type: string
      enum: [SKU, LOCATION, HU, EQUIPMENT]
    LocationType:
      type: string
      enum: [BIN, PALLET, FREE_SPACE, SHELF, GRID_BIN, ASRS_SLOT, CONVEYOR_SEGMENT, ROBOT_PORT, STATION]
    LocationPurpose:
      type: string
      enum: [STORAGE, TRANSPORT, STAGING, PICK, PACK, INDUCT, RECEIVING, SHIPPING, QUARANTINE, RETURNS]
    EquipmentFamily:
      type: string
      enum: [CONVEYOR, ASRS, AMR, AUTOSTORE]

    # ------------------------------------------------------------------ Auditable
    AuditFields:
      type: object
      properties:
        createdAt: { type: string, format: date-time, readOnly: true }
        updatedAt: { type: string, format: date-time, readOnly: true }
        version:
          type: integer
          format: int64
          readOnly: true
          description: Optimistic-lock version.

    # ------------------------------------------------------------------ Warehouse
    Warehouse:
      allOf:
        - $ref: '#/components/schemas/AuditFields'
        - type: object
          required: [code, name]
          properties:
            id: { type: string, format: uuid, readOnly: true }
            code: { type: string, example: DC1 }
            name: { type: string, example: "Distribution Center 1" }
            timezone: { type: string, default: UTC, example: Europe/Vienna }
            status: { $ref: '#/components/schemas/LifecycleStatus' }
    WarehousePage:
      allOf:
        - $ref: '#/components/schemas/Page'
        - type: object
          properties:
            content:
              type: array
              items: { $ref: '#/components/schemas/Warehouse' }

    # ------------------------------------------------------------------------ SKU
    Sku:
      allOf:
        - $ref: '#/components/schemas/AuditFields'
        - type: object
          required: [code]
          properties:
            id: { type: string, format: uuid, readOnly: true }
            code: { type: string, example: TS-001-BLK-M }
            description: { type: string, example: "Black t-shirt, size M" }
            imageUrl: { type: string, nullable: true, description: Optional product image URL. }
            status: { $ref: '#/components/schemas/LifecycleStatus' }
            ownerClient:
              type: string
              description: Owning client / 3PL tenant.
            batchTracked: { type: boolean, default: false }
            serialTracked: { type: boolean, default: false }
            dateTracked: { type: boolean, default: false }
    SkuCard:
      type: object
      description: >
        One-call product card for operator screens: SKU identity plus base-UoM dimensions and
        per-warehouse profile metadata.
      properties:
        id: { type: string, format: uuid, readOnly: true }
        code: { type: string, example: TS-001-BLK-M }
        description: { type: string, nullable: true, example: "Black t-shirt, size M" }
        imageUrl: { type: string, nullable: true }
        baseUom:
          type: object
          nullable: true
          description: The base ("EA") unit of measure carrying the single-item dimensions.
          properties:
            code: { type: string, example: EA }
            lengthMm: { type: number, format: double, nullable: true }
            widthMm: { type: number, format: double, nullable: true }
            heightMm: { type: number, format: double, nullable: true }
            weightG: { type: number, format: double, nullable: true }
        metadata:
          type: object
          additionalProperties: true
          description: The warehouse profile's metadata blob; empty without warehouseId / profile.
          example: { brand: Acme, season: SS26, color: black, size: M }
    SkuPage:
      allOf:
        - $ref: '#/components/schemas/Page'
        - type: object
          properties:
            content:
              type: array
              items: { $ref: '#/components/schemas/Sku' }

    # ----------------------------------------------------------------- SkuProfile
    SkuProfile:
      allOf:
        - $ref: '#/components/schemas/AuditFields'
        - type: object
          required: [warehouseId]
          properties:
            id: { type: string, format: uuid, readOnly: true }
            skuId: { type: string, format: uuid, readOnly: true }
            warehouseId: { type: string, format: uuid }
            metadata:
              type: object
              additionalProperties: true
              description: >
                Site-variable attributes (brand, season, color, size, velocity class …).
                Validated on write against the referenced AttributeSchema.
              example: { brand: Acme, season: SS26, color: black, size: M }
            storageStrategy:
              type: object
              additionalProperties: true
              description: >
                Storage "teach-in": allowed/preferred storage types & zones, putaway
                rules, min/max levels, mixing constraints.
              example: { allowed: [AUTOSTORE, MANUAL_BIN], min: 0, max: 240 }
            attributeSchemaId:
              type: string
              format: uuid
              nullable: true

    # ------------------------------------------------------------ AttributeSchema
    AttributeSchema:
      type: object
      required: [warehouseId, appliesTo, category, jsonSchema]
      properties:
        id: { type: string, format: uuid, readOnly: true }
        warehouseId: { type: string, format: uuid }
        appliesTo: { $ref: '#/components/schemas/AttributeScope' }
        category: { type: string, example: fashion }
        jsonSchema:
          type: object
          additionalProperties: true
          description: JSON Schema document governing the matching metadata blobs.
        schemaVersion: { type: integer, default: 1 }
        createdAt: { type: string, format: date-time, readOnly: true }
        updatedAt: { type: string, format: date-time, readOnly: true }

    # ------------------------------------------------------------- DangerousGoods
    DangerousGoods:
      allOf:
        - $ref: '#/components/schemas/AuditFields'
        - type: object
          properties:
            id: { type: string, format: uuid, readOnly: true }
            skuId: { type: string, format: uuid, readOnly: true }
            unNumber: { type: string, example: UN1993 }
            hazardClass: { type: string, example: "3" }
            packingGroup: { type: string, example: II }
            properShippingName: { type: string }
            adrImdgIataCodes:
              type: array
              items: { type: string }
            flashPoint: { type: number, format: double, nullable: true }
            netExplosiveQty: { type: number, format: double, nullable: true }
            storageSegregationRules:
              type: object
              additionalProperties: true
            handlingConstraints:
              type: object
              additionalProperties: true

    # -------------------------------------------------------------- UnitOfMeasure
    UnitOfMeasure:
      allOf:
        - $ref: '#/components/schemas/AuditFields'
        - type: object
          required: [code]
          properties:
            id: { type: string, format: uuid, readOnly: true }
            skuId: { type: string, format: uuid, readOnly: true }
            code: { type: string, example: CASE }
            parentUomId:
              type: string
              format: uuid
              nullable: true
              description: Parent UoM in the bundle hierarchy.
            qtyInParent:
              type: number
              format: double
              description: How many of this UoM make up one parent UoM.
              example: 12
            lengthMm: { type: number, format: double, nullable: true }
            widthMm: { type: number, format: double, nullable: true }
            heightMm: { type: number, format: double, nullable: true }
            weightG: { type: number, format: double, nullable: true }
            baseUnit: { type: boolean, default: false }

    # -------------------------------------------------------------------- Barcode
    Barcode:
      allOf:
        - $ref: '#/components/schemas/AuditFields'
        - type: object
          required: [value]
          properties:
            id: { type: string, format: uuid, readOnly: true }
            skuId: { type: string, format: uuid, readOnly: true }
            uomId:
              type: string
              format: uuid
              nullable: true
              description: Which packaging level (UoM) this barcode identifies.
            value: { type: string, example: "5012345678900" }
            barcodeTypeId:
              type: string
              format: uuid
              nullable: true
    BarcodeType:
      allOf:
        - $ref: '#/components/schemas/AuditFields'
        - type: object
          required: [name]
          properties:
            id: { type: string, format: uuid, readOnly: true }
            name: { type: string, example: GS1-128 }
            symbology: { type: string, example: CODE128 }
            lengthRule: { type: string, nullable: true }
            checkDigitRule: { type: string, nullable: true }
            gs1AiParsing:
              type: boolean
              default: false
              description: Whether GS1 application-identifier parsing applies.

    # ------------------------------------------------------------------- Location
    Location:
      allOf:
        - $ref: '#/components/schemas/AuditFields'
        - type: object
          required: [warehouseId, code, locationType, purpose]
          properties:
            id: { type: string, format: uuid, readOnly: true }
            warehouseId: { type: string, format: uuid }
            code: { type: string, example: A-01-02-03 }
            locationType: { $ref: '#/components/schemas/LocationType' }
            purpose: { $ref: '#/components/schemas/LocationPurpose' }
            parentId:
              type: string
              format: uuid
              nullable: true
              description: Zone / aisle / grid parent.
            coordinates:
              type: object
              additionalProperties: true
              nullable: true
            equipmentId:
              type: string
              format: uuid
              nullable: true
            status: { $ref: '#/components/schemas/LifecycleStatus' }
            capacity:
              type: object
              additionalProperties: true
              nullable: true
              description: qty / volume / weight limits.
            allowedHuTypes:
              type: array
              items: { type: string }
            allowedSkuAttrs:
              type: object
              additionalProperties: true
              nullable: true
            mixedAllowed: { type: boolean, default: true }
            replenishmentClass: { type: string, nullable: true }
    LocationPage:
      allOf:
        - $ref: '#/components/schemas/Page'
        - type: object
          properties:
            content:
              type: array
              items: { $ref: '#/components/schemas/Location' }

    # ----------------------------------------------------------- HandlingUnitType
    HandlingUnitType:
      allOf:
        - $ref: '#/components/schemas/AuditFields'
        - type: object
          required: [name]
          properties:
            id: { type: string, format: uuid, readOnly: true }
            name: { type: string, example: TOTE }
            lengthMm: { type: number, format: double, nullable: true }
            widthMm: { type: number, format: double, nullable: true }
            heightMm: { type: number, format: double, nullable: true }
            weightLimitG: { type: number, format: double, nullable: true }
            nestable: { type: boolean, default: false }

    # ------------------------------------------------------------------ Equipment
    Equipment:
      allOf:
        - $ref: '#/components/schemas/AuditFields'
        - type: object
          required: [warehouseId, family]
          properties:
            id: { type: string, format: uuid, readOnly: true }
            warehouseId: { type: string, format: uuid }
            family: { $ref: '#/components/schemas/EquipmentFamily' }
            vendor: { type: string, nullable: true }
            model: { type: string, nullable: true }
            adapterEndpoint:
              type: string
              nullable: true
              description: URL of the Go device adapter that speaks the vendor protocol.
            capabilities:
              type: object
              additionalProperties: true
              nullable: true
            status: { $ref: '#/components/schemas/LifecycleStatus' }

    # ---------------------------------------------------------------- Shared bits
    Page:
      type: object
      description: Spring-Data style page envelope.
      properties:
        content:
          type: array
          items: {}
        page: { type: integer, example: 0 }
        size: { type: integer, example: 50 }
        totalElements: { type: integer, format: int64, example: 1 }
        totalPages: { type: integer, example: 1 }
    BulkImportReport:
      type: object
      properties:
        total: { type: integer }
        created: { type: integer }
        updated: { type: integer }
        failed: { type: integer }
        errors:
          type: array
          items:
            type: object
            properties:
              row: { type: integer }
              code: { type: string }
              message: { type: string }
    SkuSyncRequest:
      type: object
      description: >
        A SKU pushed by the host with its unit-of-measure hierarchy and barcodes inline. Intra-SKU
        references are by code. The nested lists are authoritative and fully replace stored values.
      required: [code]
      properties:
        code: { type: string }
        description: { type: string, nullable: true }
        ownerClient: { type: string, nullable: true }
        batchTracked: { type: boolean, nullable: true }
        serialTracked: { type: boolean, nullable: true }
        dateTracked: { type: boolean, nullable: true }
        uoms:
          type: array
          nullable: true
          items: { $ref: '#/components/schemas/UomSync' }
        barcodes:
          type: array
          nullable: true
          items: { $ref: '#/components/schemas/BarcodeSync' }
    UomSync:
      type: object
      required: [code]
      properties:
        code: { type: string, example: CASE }
        parentCode: { type: string, nullable: true, example: EACH }
        qtyInParent: { type: number, nullable: true, example: 12 }
        lengthMm: { type: number, nullable: true }
        widthMm: { type: number, nullable: true }
        heightMm: { type: number, nullable: true }
        weightG: { type: number, nullable: true }
        baseUnit: { type: boolean, nullable: true }
    BarcodeSync:
      type: object
      required: [value]
      properties:
        value: { type: string, example: "4006381333931" }
        uomCode: { type: string, nullable: true, example: EACH }
        type: { type: string, nullable: true, example: EAN13 }
    SkuSyncReport:
      type: object
      properties:
        received: { type: integer }
        created: { type: integer }
        updated: { type: integer }
        results:
          type: array
          items:
            type: object
            properties:
              code: { type: string }
              action: { type: string, enum: [CREATED, UPDATED] }
              uoms: { type: integer }
              barcodes: { type: integer }
    ShippingService:
      type: object
      description: A dispatch service level (EXPRESS/STANDARD…), optionally tied to a carrier. Code is unique.
      required: [code]
      properties:
        id: { type: string, format: uuid, readOnly: true }
        code: { type: string, example: EXPRESS }
        name: { type: string, nullable: true }
        carrier: { type: string, nullable: true, example: DPD }
        labelTemplateCode: { type: string, nullable: true, description: Default dispatch-label template for this service. }
        status: { type: string, default: ACTIVE, enum: [ACTIVE, ARCHIVED] }
    Route:
      type: object
      description: >
        A dispatch route (region/depot). Transacted from a host system (SAP/Manhattan) — hostRef
        carries its id there. Code is unique.
      required: [code]
      properties:
        id: { type: string, format: uuid, readOnly: true }
        code: { type: string, example: CENTRAL_LONDON }
        name: { type: string, nullable: true, example: Central London }
        region: { type: string, nullable: true }
        hostRef: { type: string, nullable: true, description: The route's id in the originating host system. }
        status: { type: string, default: ACTIVE, enum: [ACTIVE, ARCHIVED] }
    LabelElement:
      type: object
      description: One positioned element of a label design (mm from the top-left).
      properties:
        type: { type: string, enum: [TEXT, ADDRESS, BARCODE, IMAGE] }
        key: { type: string, nullable: true, description: Data-binding key resolved at render time. }
        value: { type: string, nullable: true, description: Static value (overrides key). }
        xMm: { type: number }
        yMm: { type: number }
        widthMm: { type: number }
        heightMm: { type: number }
        fontPt: { type: number, nullable: true }
        barcodeSymbology: { type: string, nullable: true, example: CODE128 }
    LabelTemplate:
      type: object
      description: A dispatch-label design (admin-authored). Code is unique.
      required: [code, widthMm, heightMm]
      properties:
        id: { type: string, format: uuid, readOnly: true }
        code: { type: string, example: SHIP-4X6 }
        name: { type: string, nullable: true }
        widthMm: { type: number, example: 101.6 }
        heightMm: { type: number, example: 152.4 }
        dpi: { type: integer, default: 203 }
        elements:
          type: array
          items: { $ref: '#/components/schemas/LabelElement' }
        status: { type: string, default: ACTIVE, enum: [ACTIVE, ARCHIVED] }
    RenderLabelRequest:
      type: object
      properties:
        format: { type: string, enum: [ZPL, PDF], default: ZPL }
        data:
          type: object
          additionalProperties: { type: string }
          description: Field values for the template's data-bound elements (by element key).
    RenderedLabel:
      type: object
      properties:
        format: { type: string, enum: [ZPL, PDF] }
        payloadBase64: { type: string, description: "The rendered label bytes, base64-encoded." }
    Problem:
      type: object
      description: RFC 9457 problem detail.
      properties:
        type: { type: string, format: uri, default: about:blank }
        title: { type: string }
        status: { type: integer }
        detail: { type: string }
        instance: { type: string, format: uri }
