openapi: 3.0.3
info:
  title: openWCS Flow Orchestrator API
  version: 0.1.0
  description: >
    Dispatches device tasks to equipment adapters over the uniform internal device contract
    (build.md §8). A task is recorded REQUESTED → DISPATCHED → COMPLETED/FAILED. The first
    transport is synchronous HTTP to the adapter (simulator-friendly); the production contract
    is asynchronous over Kafka (`device.tasks` / `device.results`). Tasks carry a correlation
    id so a higher-level process (BPMN) can group the moves it triggered.
servers:
  - url: /api/flow
    description: Via the API gateway

tags:
  - name: DeviceTasks
  - name: ConveyorRouting
  - name: Reports

paths:
  /conveyor/topology:
    get:
      tags: [ConveyorRouting]
      summary: Load a warehouse's conveyor topology (for the admin schematic editor)
      operationId: getTopology
      parameters:
        - name: warehouseId
          in: query
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: The topology graph
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Topology' }
    put:
      tags: [ConveyorRouting]
      summary: Replace a warehouse's conveyor topology (editor save)
      operationId: saveTopology
      parameters:
        - name: warehouseId
          in: query
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Topology' }
      responses:
        "200":
          description: The saved topology
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Topology' }
        "400": { description: An edge references an unknown node code }
  /conveyor/routes:
    post:
      tags: [ConveyorRouting]
      summary: Assign a handling unit an ordered route plan (target node codes)
      operationId: assignRoute
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RouteRequest' }
      responses:
        "200":
          description: The active route plan
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RouteView' }
    get:
      tags: [ConveyorRouting]
      summary: Get a handling unit's active route plan
      operationId: getRoute
      parameters:
        - name: warehouseId
          in: query
          required: true
          schema: { type: string, format: uuid }
        - name: barcode
          in: query
          required: true
          schema: { type: string }
      responses:
        "200":
          description: The route plan
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RouteView' }
        "404": { description: No active route plan }
  /conveyor/routing-requests:
    post:
      tags: [ConveyorRouting]
      summary: Decide where a scanned handling unit goes next
      description: An adapter posts {node, barcode}; the WCS returns the routing decision (next hop toward the current target).
      operationId: routingRequest
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ScanRequest' }
      responses:
        "200":
          description: Routing decision
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RoutingDecision' }
  /conveyor/observations:
    post:
      tags: [ConveyorRouting]
      summary: Ingest a scan observation for topology learning
      description: A sniffer (defined-IP capture) posts observed {node, barcode}; the WCS infers a candidate topology.
      operationId: observe
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ObservationRequest' }
      responses:
        "202": { description: Accepted }
        "400": { description: Invalid observedAt }
  /conveyor/discovery:
    get:
      tags: [ConveyorRouting]
      summary: Inferred topology suggestions from observations
      operationId: discover
      parameters:
        - name: warehouseId
          in: query
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Candidate nodes/edges/targets (known flags mark what already exists)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Discovery' }

  /device-tasks:
    post:
      tags: [DeviceTasks]
      summary: Dispatch a device task
      description: >
        Records the task, dispatches it to the adapter resolved by equipment family, and
        returns the task with its terminal status. Requires DEVICE_OPERATE.
      operationId: requestDeviceTask
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RequestDeviceTask' }
      responses:
        "201":
          description: Task recorded (COMPLETED or FAILED)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DeviceTask' }
        "400":
          description: Invalid request
        "403":
          description: Missing DEVICE_OPERATE
        "422":
          description: No adapter configured for the equipment family
        "502":
          description: Adapter unreachable
    get:
      tags: [DeviceTasks]
      summary: List / search device tasks
      description: >
        Lists device tasks. With `correlationId` returns that correlation's tasks oldest-first;
        otherwise returns the most recent tasks newest-first, optionally filtered by warehouse,
        status, equipment family or equipment id. Powers the Transport overview screen. Requires
        DEVICE_VIEW.
      operationId: listDeviceTasks
      parameters:
        - name: correlationId
          in: query
          required: false
          schema: { type: string, format: uuid }
        - name: warehouseId
          in: query
          required: false
          schema: { type: string, format: uuid }
        - name: status
          in: query
          required: false
          schema: { type: string }
        - name: family
          in: query
          required: false
          schema: { type: string }
        - name: equipmentId
          in: query
          required: false
          schema: { type: string }
        - name: limit
          in: query
          required: false
          description: Max rows when not filtering by correlationId (default 100, max 500).
          schema: { type: integer, default: 100, maximum: 500 }
      responses:
        "200":
          description: Device tasks
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/DeviceTask' }
        "403":
          description: Missing DEVICE_VIEW
  /device-tasks/{id}:
    get:
      tags: [DeviceTasks]
      summary: Get a device task
      operationId: getDeviceTask
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Device task
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DeviceTask' }
        "403":
          description: Missing DEVICE_VIEW
        "404":
          description: Not found

  /reports/scan-quality:
    get:
      tags: [Reports]
      summary: Scans / no-reads / unknowns per scan point per day
      description: >
        Daily scan-quality counters per conveyor scan point, accumulated by the routing scan path
        from deployment day: every answered scan, scanner read errors (blank/"NOREAD" barcodes)
        and readable barcodes with no active route plan. Powers the scanner-error report (the UI
        forecasts failing scanners over the history). Requires DEVICE_VIEW.
      operationId: reportScanQuality
      parameters:
        - $ref: '#/components/parameters/ReportWarehouseId'
        - $ref: '#/components/parameters/ReportDays'
      responses:
        "200":
          description: Per-node daily scan-quality rows (day ascending)
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/ScanQualityRow' }
        "403":
          description: Missing DEVICE_VIEW
  /reports/traffic:
    get:
      tags: [Reports]
      summary: Conveyor traffic per directed edge per day (heatmap)
      description: >
        Daily ROUTE-answer counters per directed conveyor edge (including divert-default routes),
        accumulated by the routing scan path. Powers the traffic heatmap of the conveyor system.
        Requires DEVICE_VIEW.
      operationId: reportTraffic
      parameters:
        - $ref: '#/components/parameters/ReportWarehouseId'
        - $ref: '#/components/parameters/ReportDays'
      responses:
        "200":
          description: Per-edge daily traffic rows (day ascending)
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/TrafficRow' }
        "403":
          description: Missing DEVICE_VIEW
  /reports/storage-movements:
    get:
      tags: [Reports]
      summary: Storage movements per location per day (ASRS heatmap)
      description: >
        Completed STORE/RETRIEVE (and AutoStore BIN_*) device tasks aggregated per storage
        location per day. locationId is null when the task carried no location (e.g. degraded
        slotting). Powers the storage-movement heatmap. Requires DEVICE_VIEW.
      operationId: reportStorageMovements
      parameters:
        - $ref: '#/components/parameters/ReportWarehouseId'
        - $ref: '#/components/parameters/ReportDays'
      responses:
        "200":
          description: Per-location daily movement rows (day ascending)
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/StorageMovementRow' }
        "403":
          description: Missing DEVICE_VIEW
  /reports/device-movements:
    get:
      tags: [Reports]
      summary: Device-task throughput and failures per equipment per day
      description: >
        All device tasks aggregated per equipment per day, split into completed and failed.
        equipment is the best available label: the placed equipment's code, else the raw
        equipment id, else the family. Requires DEVICE_VIEW.
      operationId: reportDeviceMovements
      parameters:
        - $ref: '#/components/parameters/ReportWarehouseId'
        - $ref: '#/components/parameters/ReportDays'
      responses:
        "200":
          description: Per-equipment daily throughput rows (day ascending)
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/DeviceMovementRow' }
        "403":
          description: Missing DEVICE_VIEW
  /reports/transit-times:
    get:
      tags: [Reports]
      summary: Induct-to-arrival transit-time distribution per day
      description: >
        For each induction entry, the time between its INDUCTED trace row (HU left storage onto
        the conveyor) and its ARRIVED row (HU reached the induction point), aggregated per arrival
        day as sample count + p50/p95 milliseconds. Requires DEVICE_VIEW.
      operationId: reportTransitTimes
      parameters:
        - $ref: '#/components/parameters/ReportWarehouseId'
        - $ref: '#/components/parameters/ReportDays'
      responses:
        "200":
          description: Daily transit-time distribution rows (day ascending)
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/TransitTimeRow' }
        "403":
          description: Missing DEVICE_VIEW

components:
  parameters:
    ReportWarehouseId:
      name: warehouseId
      in: query
      required: true
      schema: { type: string, format: uuid }
    ReportDays:
      name: days
      in: query
      required: false
      description: History window in days, today inclusive (default 90, capped at 180).
      schema: { type: integer, default: 90, maximum: 180, minimum: 1 }
  schemas:
    Topology:
      type: object
      description: A warehouse's conveyor graph — the load/save shape for the admin editor.
      properties:
        nodes:
          type: array
          items: { $ref: '#/components/schemas/NodeDto' }
        edges:
          type: array
          items: { $ref: '#/components/schemas/EdgeDto' }
        loops:
          type: array
          items: { $ref: '#/components/schemas/LoopDto' }
    NodeDto:
      type: object
      required: [code]
      properties:
        code: { type: string, description: Node id the hardware sends on a scan. }
        name: { type: string, nullable: true }
        hardwareAddress: { type: string, nullable: true, description: "How the equipment is reached (PLC/OPC-UA address, IP:port…)." }
        posX: { type: number, nullable: true, description: Layout X for the schematic editor. }
        posY: { type: number, nullable: true }
        loopCode: { type: string, nullable: true, description: "The loop this node belongs to, if any." }
        defaultExitCode: { type: string, nullable: true, description: "For a divert node: the neighbour an unrouted HU takes by default (projected from the divert's STRAIGHT/BRANCH choice); null = stop at the divert." }
    LoopDto:
      type: object
      required: [code, maxHus]
      properties:
        code: { type: string }
        maxHus: { type: integer, description: Max handling units allowed in the loop at once. }
        whenFull: { type: string, enum: [HOLD, OVERFLOW], default: HOLD }
        overflowTarget: { type: string, nullable: true, description: Target node code when whenFull=OVERFLOW. }
    EdgeDto:
      type: object
      required: [fromCode, toCode, exitCode]
      properties:
        fromCode: { type: string }
        toCode: { type: string }
        exitCode: { type: string, description: The decision the hardware applies to traverse this edge. }
        cost: { type: integer, default: 1 }
    RouteRequest:
      type: object
      required: [warehouseId, barcode, targets]
      properties:
        warehouseId: { type: string, format: uuid }
        barcode: { type: string }
        targets:
          type: array
          items: { type: string }
          description: Ordered target node codes the handling unit must visit.
    RouteView:
      type: object
      properties:
        warehouseId: { type: string, format: uuid }
        barcode: { type: string }
        targets: { type: array, items: { type: string } }
        currentIndex: { type: integer }
        status: { type: string, enum: [ACTIVE, COMPLETED, EXCEPTION] }
        detail: { type: string, nullable: true }
    ScanRequest:
      type: object
      required: [warehouseId, node]
      properties:
        warehouseId: { type: string, format: uuid }
        node: { type: string, description: The node code where the HU was scanned. }
        barcode:
          type: string
          nullable: true
          description: >
            The scanned barcode. Blank, missing or "NOREAD" means a scanner read error: the
            decision then follows the node's divert default (or stops at a defaultless divert),
            exactly like an unknown HU.

    RoutingDecision:
      type: object
      properties:
        action: { type: string, enum: [ROUTE, COMPLETE, HOLD, NO_ROUTE, EXCEPTION] }
        exitCode: { type: string, nullable: true, description: The decision to apply at this node (ROUTE). }
        toNode: { type: string, nullable: true, description: The next node the HU is routed to. }
        currentTarget: { type: string, nullable: true }
        targetReached: { type: string, nullable: true }
        detail: { type: string, nullable: true }
    ObservationRequest:
      type: object
      required: [warehouseId, node, barcode]
      properties:
        warehouseId: { type: string, format: uuid }
        node: { type: string }
        barcode: { type: string }
        sourceIp: { type: string, nullable: true, description: IP the scan was decoded from. }
        observedAt: { type: string, format: date-time, nullable: true }
    Discovery:
      type: object
      description: Inferred topology suggestions; known flags mark what already exists in the configured graph.
      properties:
        nodes:
          type: array
          items:
            type: object
            properties:
              code: { type: string }
              observedCount: { type: integer, format: int64 }
              sourceIp: { type: string, nullable: true }
              known: { type: boolean }
        edges:
          type: array
          items:
            type: object
            properties:
              fromCode: { type: string }
              toCode: { type: string }
              count: { type: integer, format: int64 }
              known: { type: boolean }
        targets:
          type: array
          items:
            type: object
            properties:
              code: { type: string }
              terminalCount: { type: integer, format: int64 }
    RequestDeviceTask:
      type: object
      required: [warehouseId, family, command]
      properties:
        warehouseId: { type: string, format: uuid }
        family:
          type: string
          description: Equipment family that selects the adapter, e.g. CONVEYOR.
          example: CONVEYOR
        equipmentId:
          type: string
          format: uuid
          nullable: true
        command:
          type: string
          description: Adapter command, e.g. CONVEY | DIVERT | MERGE | SCAN.
          example: CONVEY
        payload:
          type: object
          additionalProperties: true
        correlationId:
          type: string
          format: uuid
          nullable: true
    DeviceTask:
      type: object
      properties:
        id: { type: string, format: uuid }
        warehouseId: { type: string, format: uuid }
        family: { type: string }
        equipmentId: { type: string, format: uuid, nullable: true }
        command: { type: string }
        payload:
          type: object
          additionalProperties: true
        correlationId: { type: string, format: uuid, nullable: true }
        status:
          type: string
          enum: [REQUESTED, DISPATCHED, COMPLETED, FAILED]
        detail: { type: string, nullable: true }
        result:
          type: object
          additionalProperties: true
          nullable: true
        actor: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
    ScanQualityRow:
      type: object
      description: Daily scan-quality counters of one scan point.
      properties:
        node: { type: string, description: Scan point (conveyor node code). }
        day: { type: string, format: date }
        scans: { type: integer, format: int64, description: Scans answered at the node that day. }
        noReads: { type: integer, format: int64, description: Scanner read errors (blank/"NOREAD"). }
        unknowns: { type: integer, format: int64, description: Readable barcodes with no active route plan. }
    TrafficRow:
      type: object
      description: Daily traffic over one directed conveyor edge (heatmap weight).
      properties:
        fromNode: { type: string }
        toNode: { type: string }
        day: { type: string, format: date }
        count: { type: integer, format: int64, description: ROUTE answers over the edge that day. }
    StorageMovementRow:
      type: object
      description: Completed storage movements at one location on one day.
      properties:
        locationId: { type: string, format: uuid, nullable: true, description: Null when the task carried no location id. }
        day: { type: string, format: date }
        stores: { type: integer, format: int64, description: Completed STORE/BIN_STORE tasks. }
        retrieves: { type: integer, format: int64, description: Completed RETRIEVE/BIN_RETRIEVE tasks. }
    DeviceMovementRow:
      type: object
      description: Device-task throughput of one equipment on one day.
      properties:
        equipment: { type: string, description: "Best available label: placed-equipment code, else equipment id, else family." }
        family: { type: string, description: CONVEYOR | ASRS | AMR | AUTOSTORE. }
        day: { type: string, format: date }
        completed: { type: integer, format: int64 }
        failed: { type: integer, format: int64 }
    TransitTimeRow:
      type: object
      description: Induct-to-arrival transit-time distribution of one day.
      properties:
        day: { type: string, format: date }
        count: { type: integer, format: int64, description: Induction entries that arrived that day. }
        p50Ms: { type: integer, format: int64, description: Median transit time in milliseconds. }
        p95Ms: { type: integer, format: int64, description: 95th-percentile transit time in milliseconds. }
