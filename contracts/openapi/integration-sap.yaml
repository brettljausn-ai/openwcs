openapi: 3.0.3
info:
  title: openWCS SAP Integration API
  version: 0.1.0
  description: >
    Host integration gateway / anti-corruption layer for SAP. Currently exposes per-shipper
    dispatch-label barcode allocation: after cubing produces the cartons, allocation requests a
    unique label barcode per shipper from the host. (Skeleton: returns a deterministic barcode;
    the real OData/BAPI/RFC call is wired later.)
servers:
  - url: /api/integration/sap
    description: Via the API gateway

tags:
  - name: Labels
  - name: Routes
  - name: Orders

paths:
  /orders:
    post:
      tags: [Orders]
      summary: Translate a SAP order into the canonical Host API
      description: Anti-corruption layer — reshapes a SAP order and resolves materials to SKUs, then calls /api/host/orders.
      operationId: sapOrder
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SapOrder' }
      responses:
        "200": { description: Accepted and forwarded }
        "422": { description: A material could not be resolved to a SKU }
  /asns:
    post:
      tags: [Orders]
      summary: Translate a SAP inbound delivery into the canonical Host API (ASN)
      operationId: sapAsn
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SapAsn' }
      responses:
        "200": { description: Accepted and forwarded }
        "422": { description: A material could not be resolved to a SKU }
  /routes/sync:
    post:
      tags: [Routes]
      summary: Upsert host routes into the master-data Route catalog
      description: The host (SAP) is the source of truth for routes; this upserts them by code.
      operationId: syncRoutes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items: { $ref: '#/components/schemas/RouteDto' }
      responses:
        "200":
          description: Sync summary
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RouteSyncResult' }
  /labels:
    post:
      tags: [Labels]
      summary: Allocate a label barcode for one shipper
      operationId: allocateLabelBarcode
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LabelBarcodeRequest' }
      responses:
        "200":
          description: Allocated barcode
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LabelBarcodeResponse' }

components:
  schemas:
    LabelBarcodeRequest:
      type: object
      required: [orderRef, seqNo]
      properties:
        orderRef: { type: string }
        warehouseId: { type: string, format: uuid, nullable: true }
        serviceCode: { type: string, nullable: true }
        routeCode: { type: string, nullable: true }
        seqNo: { type: integer, description: Carton sequence within the order (1..N). }
    LabelBarcodeResponse:
      type: object
      properties:
        barcode: { type: string }
    RouteDto:
      type: object
      required: [code]
      properties:
        code: { type: string, example: CENTRAL_LONDON }
        name: { type: string, nullable: true }
        region: { type: string, nullable: true }
        hostRef: { type: string, nullable: true, description: The route's id in the host system. }
    RouteSyncResult:
      type: object
      properties:
        received: { type: integer }
        created: { type: integer }
        updated: { type: integer }
    SapItem:
      type: object
      properties:
        material: { type: string, description: SAP material number (resolved to a SKU code). }
        quantity: { type: number }
    SapShipTo:
      type: object
      properties:
        name: { type: string }
        street: { type: string }
        city: { type: string }
        postalCode: { type: string }
        country: { type: string }
    SapOrder:
      type: object
      required: [salesOrder, warehouseId]
      properties:
        salesOrder: { type: string }
        warehouseId: { type: string, format: uuid }
        soldTo: { type: string }
        serviceCode: { type: string }
        routeCode: { type: string }
        shipTo: { $ref: '#/components/schemas/SapShipTo' }
        items:
          type: array
          items: { $ref: '#/components/schemas/SapItem' }
    SapAsn:
      type: object
      required: [inboundDelivery, warehouseId]
      properties:
        inboundDelivery: { type: string }
        warehouseId: { type: string, format: uuid }
        supplier: { type: string }
        items:
          type: array
          items: { $ref: '#/components/schemas/SapItem' }
