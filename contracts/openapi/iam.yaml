openapi: 3.0.3
info:
  title: openWCS IAM API
  version: 0.1.0
  description: >
    The openWCS authorization model (build.md §4.8): users → roles → code-defined
    permissions. Authentication itself is handled by Keycloak (OIDC); this service owns the
    RBAC layered on top. The gateway validates JWTs and forwards the identity; per-endpoint
    permission enforcement uses the catalog exposed here.
servers:
  - url: /
    description: Via the API gateway (routes /api/iam/**)

tags:
  - name: Permissions
  - name: Roles
  - name: Users
  - name: Screen access

paths:
  /api/iam/permissions:
    get:
      tags: [Permissions]
      summary: The code-defined permission catalog
      operationId: listPermissions
      responses:
        "200":
          description: OK
          content:
            application/json: { schema: { type: array, items: { type: string } } }

  /api/iam/roles:
    get:
      tags: [Roles]
      summary: List roles
      operationId: listRoles
      responses:
        "200":
          description: OK
          content:
            application/json: { schema: { type: array, items: { $ref: '#/components/schemas/Role' } } }
    post:
      tags: [Roles]
      summary: Create a role
      operationId: createRole
      requestBody:
        required: true
        content:
          application/json: { schema: { $ref: '#/components/schemas/CreateRole' } }
      responses:
        "201": { description: Created, content: { application/json: { schema: { $ref: '#/components/schemas/Role' } } } }
        "400": { $ref: '#/components/responses/Problem' }
        "409": { $ref: '#/components/responses/Problem' }
  /api/iam/roles/{name}:
    parameters: [ { name: name, in: path, required: true, schema: { type: string } } ]
    get:
      tags: [Roles]
      summary: Get a role
      operationId: getRole
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Role' } } } }
        "404": { $ref: '#/components/responses/Problem' }
  /api/iam/roles/{name}/permissions:
    parameters: [ { name: name, in: path, required: true, schema: { type: string } } ]
    put:
      tags: [Roles]
      summary: Replace a role's permissions
      operationId: setRolePermissions
      requestBody:
        required: true
        content:
          application/json: { schema: { $ref: '#/components/schemas/SetPermissions' } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Role' } } } }
        "400": { $ref: '#/components/responses/Problem' }
        "404": { $ref: '#/components/responses/Problem' }

  /api/iam/users:
    get:
      tags: [Users]
      summary: List users
      operationId: listUsers
      responses:
        "200":
          description: OK
          content:
            application/json: { schema: { type: array, items: { $ref: '#/components/schemas/User' } } }
    post:
      tags: [Users]
      summary: Create a user
      operationId: createUser
      requestBody:
        required: true
        content:
          application/json: { schema: { $ref: '#/components/schemas/CreateUser' } }
      responses:
        "201": { description: Created, content: { application/json: { schema: { $ref: '#/components/schemas/User' } } } }
        "409": { $ref: '#/components/responses/Problem' }
  /api/iam/users/{username}:
    parameters: [ { name: username, in: path, required: true, schema: { type: string } } ]
    get:
      tags: [Users]
      summary: Get a user (with roles + effective permissions)
      operationId: getUser
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/User' } } } }
        "404": { $ref: '#/components/responses/Problem' }
  /api/iam/users/{username}/roles:
    parameters: [ { name: username, in: path, required: true, schema: { type: string } } ]
    put:
      tags: [Users]
      summary: Replace a user's roles
      operationId: setUserRoles
      requestBody:
        required: true
        content:
          application/json: { schema: { $ref: '#/components/schemas/SetRoles' } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/User' } } } }
        "404": { $ref: '#/components/responses/Problem' }
  /api/iam/users/{username}/permissions:
    parameters: [ { name: username, in: path, required: true, schema: { type: string } } ]
    get:
      tags: [Users]
      summary: A user's effective permissions
      operationId: userPermissions
      responses:
        "200":
          description: OK
          content:
            application/json: { schema: { type: array, items: { type: string } } }
        "404": { $ref: '#/components/responses/Problem' }

  /api/iam/screen-access:
    get:
      tags: [Screen access]
      summary: Per-screen access overrides
      description: >
        The override map, keyed by the UI-owned screen key. Only overridden screens have an
        entry; screens without one fall back to the UI's default roles. Matches the shape the
        UI's AuthContext merges (ui/src/auth/screens.ts AccessOverrides).
      operationId: getScreenAccess
      responses:
        "200":
          description: OK
          content:
            application/json: { schema: { $ref: '#/components/schemas/ScreenAccessMap' } }
    put:
      tags: [Screen access]
      summary: Replace the whole screen-access override map
      description: >
        Full replacement. Screens absent from the body lose their override; entries with neither
        roles nor users are dropped (back to UI defaults). Screen keys are persisted verbatim.
      operationId: setScreenAccess
      requestBody:
        required: true
        content:
          application/json: { schema: { $ref: '#/components/schemas/ScreenAccessMap' } }
      responses:
        "200":
          description: OK
          content:
            application/json: { schema: { $ref: '#/components/schemas/ScreenAccessMap' } }
  /api/iam/screen-access/me:
    get:
      tags: [Screen access]
      summary: Screen keys the current user can access by override
      description: >
        Resolves the forwarded identity (X-Auth-User / X-Auth-Roles) against the stored
        overrides. Only overridden screens are reported; non-overridden screens use the UI
        defaults and are resolved client-side. ADMIN sees every overridden screen.
      operationId: getMyScreenAccess
      parameters:
        - { name: X-Auth-User, in: header, required: false, schema: { type: string } }
        - { name: X-Auth-Roles, in: header, required: false, schema: { type: string }, description: Comma-separated role names. }
      responses:
        "200":
          description: OK
          content:
            application/json: { schema: { type: array, items: { type: string } } }

components:
  responses:
    Problem:
      description: RFC 9457 problem detail
      content:
        application/problem+json: { schema: { $ref: '#/components/schemas/Problem' } }
  schemas:
    Role:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        description: { type: string, nullable: true }
        system: { type: boolean }
        permissions: { type: array, items: { type: string } }
    User:
      type: object
      properties:
        id: { type: string, format: uuid }
        username: { type: string }
        displayName: { type: string, nullable: true }
        externalId: { type: string, nullable: true, description: Keycloak subject. }
        status: { type: string }
        roles: { type: array, items: { type: string } }
        permissions: { type: array, items: { type: string }, description: Effective (union across roles). }
    CreateUser:
      type: object
      required: [username]
      properties:
        username: { type: string }
        displayName: { type: string, nullable: true }
        externalId: { type: string, nullable: true }
    CreateRole:
      type: object
      required: [name]
      properties:
        name: { type: string }
        description: { type: string, nullable: true }
        permissions: { type: array, items: { type: string } }
    SetRoles:
      type: object
      properties:
        roleNames: { type: array, items: { type: string } }
    SetPermissions:
      type: object
      properties:
        permissions: { type: array, items: { type: string } }
    ScreenAccessMap:
      type: object
      description: Map of screen key → override. Only overridden screens are present.
      additionalProperties: { $ref: '#/components/schemas/ScreenAccess' }
    ScreenAccess:
      type: object
      description: Per-screen override; when present it replaces the screen's default roles.
      properties:
        roles: { type: array, items: { type: string }, description: Roles allowed onto the screen. }
        users: { type: array, items: { type: string }, description: Individual usernames allowed onto the screen. }
    Problem:
      type: object
      properties:
        type: { type: string, format: uri, default: about:blank }
        title: { type: string }
        status: { type: integer }
        detail: { type: string }
        instance: { type: string, format: uri }
