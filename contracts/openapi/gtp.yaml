openapi: 3.0.3
info:
  title: openWCS GTP API
  version: 0.1.0
  description: >
    "Goods-to-person (GTP) station execution (ADR 0006): configure stations and their STOCK/ORDER
    nodes, open order destinations (bind an order HU + post demand), present a stock HU to generate
    a put-to-light put-list across destinations (ORDER_LOCATION or PUT_WALL mode), confirm puts, and
    query station / cycle state. A station also supports a set of orthogonal *operating modes*
    (PICKING | DECANTING | STOCK_COUNT | QC | MAINTENANCE) — each work cycle runs one and carries the
    mode-appropriate task lines (decant-moves / count entries / verdicts / checks).
    References orders/SKUs/HUs/locations by UUID."
servers:
  - url: /api/gtp
    description: Via the API gateway

tags:
  - name: Stations
  - name: WorkCycle
  - name: Workplaces

paths:
  /workplaces:
    get:
      tags: [Workplaces]
      summary: List GTP workplaces (stations) to pick from in the operator console
      description: "Lists the GTP stations in a warehouse as operator workplaces, flagging which currently have an active session (inUse)."
      operationId: listWorkplaces
      parameters:
        - { name: warehouseId, in: query, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Workplace' }
  /workplaces/{stationId}:
    parameters:
      - { name: stationId, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [Workplaces]
      summary: Get a single workplace and its nodes (work context)
      operationId: getWorkplace
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Workplace' }
        "404":
          description: "Workplace not found"
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
  /workplaces/{stationId}/session:
    parameters:
      - { name: stationId, in: path, required: true, schema: { type: string, format: uuid } }
    post:
      tags: [Workplaces]
      summary: Claim a workplace (open an operator session)
      description: >
        "Claim the workplace for an operator and return a sessionId plus the work context. Supersedes
        any session already active on the workplace (single active session per workplace), so the
        prior operator's console detects — via its heartbeat/stream — that it was taken over."
      operationId: claimWorkplace
      parameters:
        - { name: operator, in: query, required: false, schema: { type: string }, description: "Operator id fallback when no X-Auth-User header is forwarded." }
      responses:
        "200":
          description: Session claimed
          content:
            application/json:
              schema: { $ref: '#/components/schemas/WorkplaceSession' }
        "404":
          description: "Workplace not found"
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
  /workplaces/{stationId}/session/{sessionId}/heartbeat:
    parameters:
      - { name: stationId, in: path, required: true, schema: { type: string, format: uuid } }
      - { name: sessionId, in: path, required: true, schema: { type: string, format: uuid } }
    post:
      tags: [Workplaces]
      summary: Heartbeat (keep-alive) a workplace session
      description: >
        "Refresh the session's keep-alive and learn whether it still owns the workplace. Returns
        {active:true} while live, or {active:false, reason:'superseded'} once it was taken over by a
        newer claim (or 'released' after a clean release)."
      operationId: heartbeatSession
      responses:
        "200":
          description: Session status
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SessionStatus' }
        "404":
          description: "Session not found for this workplace"
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
    delete:
      tags: [Workplaces]
      summary: Release a workplace session (clean close)
      operationId: releaseSession
      responses:
        "200":
          description: Session status after release
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SessionStatus' }
        "404":
          description: "Session not found for this workplace"
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
  /workplaces/{stationId}/session/{sessionId}/stream:
    parameters:
      - { name: stationId, in: path, required: true, schema: { type: string, format: uuid } }
      - { name: sessionId, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [Workplaces]
      summary: Stream workplace session status (Server-Sent Events)
      description: >
        "A nicer alternative to polling the heartbeat: emits a 'status' event while active, then a
        terminal 'superseded' (or 'released') event carrying a SessionStatus once the session is no
        longer active, after which the stream completes."
      operationId: streamSession
      responses:
        "200":
          description: "An SSE stream of SessionStatus events."
          content:
            text/event-stream:
              schema:
                type: string
                description: "SSE frames whose data field is a SessionStatus JSON object."
  /stations:
    post:
      tags: [Stations]
      summary: Create (configure) a GTP station
      operationId: createStation
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateStationRequest' }
      responses:
        "200":
          description: Station created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Station' }
        "409":
          description: "Station code already exists in the warehouse"
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
    get:
      tags: [Stations]
      summary: List stations in a warehouse
      operationId: listStations
      parameters:
        - { name: warehouseId, in: query, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Station' }
  /stations/{stationId}:
    parameters:
      - { name: stationId, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [Stations]
      summary: Get a station and its nodes
      operationId: getStation
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Station' }
        "404":
          description: "Station not found"
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
    put:
      tags: [Stations]
      summary: Update a station's configuration
      description: "Update a station's code, display name, destination topology mode, status and (optionally) supported operating modes."
      operationId: updateStation
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateStationRequest' }
      responses:
        "200":
          description: Updated station
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Station' }
        "404":
          description: "Station not found"
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        "409":
          description: "Station code already exists in the warehouse"
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
    delete:
      tags: [Stations]
      summary: Delete a station
      description: "Delete a station and (cascading) its nodes, demand and work cycles."
      operationId: deleteStation
      responses:
        "204":
          description: "Deleted"
        "404":
          description: "Station not found"
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
  /stations/nodes/{nodeId}:
    parameters:
      - { name: nodeId, in: path, required: true, schema: { type: string, format: uuid } }
    put:
      tags: [Stations]
      summary: Update a station node
      description: "Update a node's role, code, put-light/destination wiring, mapped location, bound order HU, position and status."
      operationId: updateNode
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateNodeRequest' }
      responses:
        "200":
          description: Updated node
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Node' }
        "404":
          description: "Node not found"
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
    delete:
      tags: [Stations]
      summary: Remove a station node
      operationId: deleteNode
      responses:
        "204":
          description: "Deleted"
        "404":
          description: "Node not found"
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
  /stations/{stationId}/nodes:
    parameters:
      - { name: stationId, in: path, required: true, schema: { type: string, format: uuid } }
    post:
      tags: [Stations]
      summary: Add a node to a station
      operationId: addNode
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AddNodeRequest' }
      responses:
        "200":
          description: Node added
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Node' }
  /stations/{stationId}/operating-modes:
    parameters:
      - { name: stationId, in: path, required: true, schema: { type: string, format: uuid } }
    post:
      tags: [Stations]
      summary: Configure a station's supported operating modes
      description: "Replace the set of operating modes the station supports. PICKING is always retained."
      operationId: setSupportedModes
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SetSupportedModesRequest' }
      responses:
        "200":
          description: Updated station
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Station' }
        "404":
          description: "Station not found"
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
  /stations/{stationId}/capacity:
    parameters:
      - { name: stationId, in: path, required: true, schema: { type: string, format: uuid } }
    post:
      tags: [Stations]
      summary: Configure a station's in-transit handling-unit caps
      description: >
        "Set how many handling units may have an active transport inbound to the station at once,
        split into PICKING and OTHER (non-picking) mode classes. Both values must be non-negative.
        Config only; the enforcement is built separately."
      operationId: setCapacity
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SetCapacityRequest' }
      responses:
        "200":
          description: Updated station
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Station' }
        "404":
          description: "Station not found"
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
  /stations/{stationId}/queue:
    parameters:
      - { name: stationId, in: path, required: true, schema: { type: string, format: uuid } }
    post:
      tags: [Stations]
      summary: Route a handling unit to the station's inbound queue
      description: >
        Enqueues an HU inbound to the station. Conveyor transports arrive after distance / 0.5 m/s
        (IN_TRANSIT until due); ASRS / AMR / AutoStore arrive immediately (QUEUED). Rejected with 409
        if the station is not active, is draining, does not support the mode, or its in-transit cap
        (PICKING vs OTHER) is reached.
      operationId: enqueueStationHu
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/EnqueueRequest' }
      responses:
        "200":
          description: Queue entry
          content:
            application/json:
              schema: { $ref: '#/components/schemas/StationQueueEntry' }
        "409": { description: Station cannot accept the HU }
    get:
      tags: [Stations]
      summary: The station's live inbound queue (FIFO by arrival)
      operationId: getStationQueue
      responses:
        "200":
          description: Queue entries (IN_TRANSIT + QUEUED), arrival order
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/StationQueueEntry' }
  /queue/{entryId}/complete:
    parameters:
      - { name: entryId, in: path, required: true, schema: { type: string, format: uuid } }
    post:
      tags: [Stations]
      summary: Mark a queued HU as worked off (DONE)
      operationId: completeQueueEntry
      responses:
        "200":
          description: Updated entry
          content:
            application/json:
              schema: { $ref: '#/components/schemas/StationQueueEntry' }
  /stations/{stationId}/deactivate:
    parameters:
      - { name: stationId, in: path, required: true, schema: { type: string, format: uuid } }
    post:
      tags: [Stations]
      summary: Deactivate (drain) a station — finishes queued work, takes no new HUs
      operationId: deactivateStation
      responses:
        "200":
          description: Updated station
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Station' }
  /stations/{stationId}/activate:
    parameters:
      - { name: stationId, in: path, required: true, schema: { type: string, format: uuid } }
    post:
      tags: [Stations]
      summary: Re-activate a drained station so it accepts new HUs again
      operationId: activateStation
      responses:
        "200":
          description: Updated station
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Station' }
  /stations/{stationId}/demand:
    parameters:
      - { name: stationId, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [Stations]
      summary: List open/closed demand across a station's destinations
      operationId: stationDemand
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Demand' }
  /stations/nodes/{nodeId}/destinations:
    parameters:
      - { name: nodeId, in: path, required: true, schema: { type: string, format: uuid } }
    post:
      tags: [Stations]
      summary: Open an order destination at an ORDER node
      description: >
        "Bind an order HU to the ORDER node and post its demand (a SKU and how many units must be
        put there). Demand normally originates from allocation/order-management."
      operationId: openDestination
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/OpenDestinationRequest' }
      responses:
        "200":
          description: Destination opened
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Demand' }
        "400":
          description: "Node is not an ORDER node"
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /stations/{stationId}/present:
    parameters:
      - { name: stationId, in: path, required: true, schema: { type: string, format: uuid } }
    post:
      tags: [WorkCycle]
      summary: Present a stock HU and get the put-list
      description: >
        "Match the presented stock HU's SKU against open demand across the station's ORDER nodes and
        greedily fill it most-needed-first. Returns the work cycle with its generated put-list (one
        stock HU serving many destinations: the goods-to-person batch)."
      operationId: presentStock
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PresentStockRequest' }
      responses:
        "200":
          description: Work cycle with put-list
          content:
            application/json:
              schema: { $ref: '#/components/schemas/WorkCycle' }
        "409":
          description: "Station has no STOCK node configured"
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
  /stations/{stationId}/cycles:
    parameters:
      - { name: stationId, in: path, required: true, schema: { type: string, format: uuid } }
    post:
      tags: [WorkCycle]
      summary: Open a work cycle in a given operating mode
      description: >
        "Start a work cycle in a given operating mode (PICKING | DECANTING | STOCK_COUNT | QC |
        MAINTENANCE) and present its HU(s), generating the mode-appropriate task lines: decant-moves
        (DECANTING), count entries (STOCK_COUNT), verdict slots (QC), or check slots (MAINTENANCE).
        For PICKING this is equivalent to POST /stations/{id}/present and returns a put-list."
      operationId: startCycle
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/StartCycleRequest' }
      responses:
        "200":
          description: Work cycle with its task lines (or put-list, for PICKING)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/WorkCycle' }
        "409":
          description: "Station does not support the operating mode, or has no STOCK node"
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
  /cycles/{cycleId}:
    parameters:
      - { name: cycleId, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [WorkCycle]
      summary: Get a work cycle and its put-list
      operationId: getCycle
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/WorkCycle' }
        "404":
          description: "Cycle not found"
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
  /cycles/{cycleId}/close:
    parameters:
      - { name: cycleId, in: path, required: true, schema: { type: string, format: uuid } }
    post:
      tags: [WorkCycle]
      summary: Close a work cycle
      description: "Cancel any still-OPEN puts and close the cycle (e.g. the stock HU is sent away)."
      operationId: closeCycle
      responses:
        "200":
          description: Closed
          content:
            application/json:
              schema: { $ref: '#/components/schemas/WorkCycle' }
  /puts/{putInstructionId}/confirm:
    parameters:
      - { name: putInstructionId, in: path, required: true, schema: { type: string, format: uuid } }
    post:
      tags: [WorkCycle]
      summary: Confirm a put
      description: >
        "Confirm a put instruction. Omit qty (or send the full lit qty) for a normal confirm; a
        smaller qty is a short put (the instruction closes SHORT and the destination's remaining
        demand stays open for a later cycle)."
      operationId: confirmPut
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ConfirmPutRequest' }
      responses:
        "200":
          description: Updated put instruction
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PutInstruction' }
        "404":
          description: "Put instruction not found"
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        "409":
          description: "Put instruction is not OPEN"
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
  /tasks/{taskLineId}/outcome:
    parameters:
      - { name: taskLineId, in: path, required: true, schema: { type: string, format: uuid } }
    post:
      tags: [WorkCycle]
      summary: Submit a task-line outcome
      description: >
        "Submit the per-line outcome of a non-PICKING task line and confirm it: the moved qty
        (DECANT_MOVE), the counted qty — variance is computed vs the expected (COUNT_ENTRY), a
        PASS|FAIL|HOLD verdict (QC_VERDICT), or an OK|DEFECTIVE|REPAIR verdict (MAINTENANCE_CHECK)."
      operationId: submitOutcome
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SubmitOutcomeRequest' }
      responses:
        "200":
          description: Updated, confirmed task line
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TaskLine' }
        "404":
          description: "Task line not found"
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        "409":
          description: "Task line is not OPEN"
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

components:
  schemas:
    OperatingMode:
      type: string
      enum: [PICKING, DECANTING, STOCK_COUNT, QC, MAINTENANCE]
      description: "What the operator does with a presented HU (orthogonal to the destination topology `mode`)."
    CreateStationRequest:
      type: object
      required: [warehouseId, code, mode]
      properties:
        warehouseId: { type: string, format: uuid }
        code: { type: string }
        name: { type: string, nullable: true, description: "Optional human-readable display name." }
        mode: { type: string, enum: [ORDER_LOCATION, PUT_WALL] }
        supportedModes:
          type: array
          description: "Operating modes the station supports; defaults to [PICKING] when omitted."
          items: { $ref: '#/components/schemas/OperatingMode' }
        nodes:
          type: array
          items: { $ref: '#/components/schemas/AddNodeRequest' }
    UpdateStationRequest:
      type: object
      required: [code, mode]
      description: >
        "Update a station's editable configuration. The warehouse is immutable. When supportedModes is
        omitted/null the current set is kept; when present it replaces the set (PICKING is always retained)."
      properties:
        code: { type: string }
        name: { type: string, nullable: true }
        mode: { type: string, enum: [ORDER_LOCATION, PUT_WALL] }
        status: { type: string, nullable: true, description: "e.g. ACTIVE | INACTIVE." }
        supportedModes:
          type: array
          nullable: true
          items: { $ref: '#/components/schemas/OperatingMode' }
    UpdateNodeRequest:
      type: object
      required: [role, code]
      properties:
        role: { type: string, enum: [STOCK, ORDER] }
        code: { type: string }
        putLightId: { type: string, nullable: true, description: "Physical put-light/display id (ORDER role)." }
        locationId: { type: string, format: uuid, nullable: true }
        orderHuId: { type: string, format: uuid, nullable: true }
        position: { type: integer, nullable: true }
        status: { type: string, nullable: true }
    SetSupportedModesRequest:
      type: object
      required: [supportedModes]
      properties:
        supportedModes:
          type: array
          minItems: 1
          items: { $ref: '#/components/schemas/OperatingMode' }
    SetCapacityRequest:
      type: object
      required: [maxInTransitPicking, maxInTransitOther]
      description: >
        "Caps for how many handling units may have an active transport inbound to the station at once,
        split by mode class. Both values must be non-negative."
      properties:
        maxInTransitPicking: { type: integer, minimum: 0, description: "Cap for PICKING transports inbound to the station." }
        maxInTransitOther: { type: integer, minimum: 0, description: "Cap for all non-PICKING (other) transports inbound to the station." }
    StartCycleRequest:
      type: object
      required: [operatingMode]
      properties:
        operatingMode: { $ref: '#/components/schemas/OperatingMode' }
        stockNodeId: { type: string, format: uuid, nullable: true, description: "Specific STOCK node; defaults to the station's first." }
        stockHuId: { type: string, format: uuid, nullable: true, description: "Presented source/stock HU (or empty carrier for MAINTENANCE)." }
        targetHuId: { type: string, format: uuid, nullable: true, description: "Empty target HU to fill (DECANTING)." }
        skuId: { type: string, format: uuid, nullable: true, description: "Single SKU (PICKING)." }
        qty: { type: number, nullable: true, description: "Presented qty (PICKING)." }
        lines:
          type: array
          description: "Mode-appropriate task lines (decant moves / count entries / verdict slots / check slots)."
          items: { $ref: '#/components/schemas/LineSpec' }
    LineSpec:
      type: object
      properties:
        huId: { type: string, format: uuid, nullable: true }
        skuId: { type: string, format: uuid, nullable: true }
        compartment: { type: string, nullable: true, description: "Target compartment (DECANT_MOVE)." }
        qty: { type: number, nullable: true, description: "Qty to move (DECANT) or expected/system qty (STOCK_COUNT)." }
        putLightId: { type: string, nullable: true }
    SubmitOutcomeRequest:
      type: object
      properties:
        actualQty: { type: number, nullable: true, description: "Moved qty (DECANT) or counted qty (STOCK_COUNT)." }
        verdict: { type: string, nullable: true, description: "PASS|FAIL|HOLD (QC) or OK|DEFECTIVE|REPAIR (MAINTENANCE)." }
    AddNodeRequest:
      type: object
      required: [role, code]
      properties:
        role: { type: string, enum: [STOCK, ORDER] }
        code: { type: string }
        putLightId: { type: string, nullable: true, description: "Physical put-light/display id (ORDER role)." }
        locationId: { type: string, format: uuid, nullable: true }
        orderHuId: { type: string, format: uuid, nullable: true }
        position: { type: integer, nullable: true }
    OpenDestinationRequest:
      type: object
      required: [orderHuId, orderRef, skuId, qty]
      properties:
        orderHuId: { type: string, format: uuid }
        orderRef: { type: string }
        orderLineId: { type: string, format: uuid, nullable: true }
        skuId: { type: string, format: uuid }
        qty: { type: number }
    PresentStockRequest:
      type: object
      required: [stockHuId, skuId, qty]
      properties:
        stockNodeId: { type: string, format: uuid, nullable: true, description: "Specific STOCK node; defaults to the station's first." }
        stockHuId: { type: string, format: uuid }
        skuId: { type: string, format: uuid }
        qty: { type: number }
    ConfirmPutRequest:
      type: object
      properties:
        qty: { type: number, nullable: true, description: "Putted qty; omit for the full lit qty, smaller for a short put." }
    Station:
      type: object
      properties:
        id: { type: string, format: uuid }
        warehouseId: { type: string, format: uuid }
        code: { type: string }
        name: { type: string, nullable: true, description: "Optional human-readable display name." }
        mode: { type: string, enum: [ORDER_LOCATION, PUT_WALL] }
        supportedModes:
          type: array
          items: { $ref: '#/components/schemas/OperatingMode' }
        status: { type: string }
        acceptingWork: { type: boolean, description: "False when the station is deactivated (draining): finishes queued work, takes no new HUs." }
        maxInTransitPicking: { type: integer, description: "Max HUs with an active PICKING transport inbound to this station at once." }
        maxInTransitOther: { type: integer, description: "Max HUs with an active non-PICKING (other) transport inbound to this station at once." }
        nodes:
          type: array
          items: { $ref: '#/components/schemas/Node' }
    EnqueueRequest:
      type: object
      required: [mode]
      properties:
        huId: { type: string, format: uuid, nullable: true }
        huCode: { type: string, nullable: true }
        skuId: { type: string, format: uuid, nullable: true }
        skuCode: { type: string, nullable: true }
        qty: { type: number, nullable: true }
        mode: { $ref: '#/components/schemas/OperatingMode' }
        family: { type: string, nullable: true, description: "Transport family: CONVEYOR | ASRS | AMR | AUTOSTORE. Drives arrival timing." }
        distanceM: { type: number, nullable: true, description: "Conveyor travel distance in metres (arrival = distance / 0.5 m/s)." }
    StationQueueEntry:
      type: object
      properties:
        id: { type: string, format: uuid }
        stationId: { type: string, format: uuid }
        huId: { type: string, format: uuid, nullable: true }
        huCode: { type: string, nullable: true }
        skuId: { type: string, format: uuid, nullable: true }
        skuCode: { type: string, nullable: true }
        qty: { type: number, nullable: true }
        mode: { type: string }
        status: { type: string, enum: [IN_TRANSIT, QUEUED, DONE] }
        arrivalAt: { type: string, format: date-time }
    Node:
      type: object
      properties:
        id: { type: string, format: uuid }
        role: { type: string, enum: [STOCK, ORDER] }
        code: { type: string }
        putLightId: { type: string, nullable: true }
        locationId: { type: string, format: uuid, nullable: true }
        orderHuId: { type: string, format: uuid, nullable: true }
        position: { type: integer }
        status: { type: string }
    Demand:
      type: object
      properties:
        id: { type: string, format: uuid }
        stationNodeId: { type: string, format: uuid }
        orderRef: { type: string }
        orderLineId: { type: string, format: uuid, nullable: true }
        skuId: { type: string, format: uuid }
        requestedQty: { type: number }
        puttedQty: { type: number }
        remainingQty: { type: number }
        status: { type: string, enum: [OPEN, COMPLETED, CANCELLED] }
    WorkCycle:
      type: object
      properties:
        id: { type: string, format: uuid }
        stationId: { type: string, format: uuid }
        operatingMode: { $ref: '#/components/schemas/OperatingMode' }
        stockNodeId: { type: string, format: uuid }
        stockHuId: { type: string, format: uuid, nullable: true }
        targetHuId: { type: string, format: uuid, nullable: true, description: "Filled target HU (DECANTING)." }
        skuId: { type: string, format: uuid, nullable: true }
        mode: { type: string, enum: [ORDER_LOCATION, PUT_WALL] }
        presentedQty: { type: number, nullable: true }
        remainingQty: { type: number, nullable: true }
        status: { type: string, enum: [OPEN, COMPLETED, CLOSED] }
        puts:
          type: array
          description: "PICKING put-list."
          items: { $ref: '#/components/schemas/PutInstruction' }
        taskLines:
          type: array
          description: "Mode-appropriate task lines (non-PICKING modes)."
          items: { $ref: '#/components/schemas/TaskLine' }
    TaskLine:
      type: object
      properties:
        id: { type: string, format: uuid }
        lineType: { type: string, enum: [DECANT_MOVE, COUNT_ENTRY, QC_VERDICT, MAINTENANCE_CHECK] }
        huId: { type: string, format: uuid, nullable: true }
        skuId: { type: string, format: uuid, nullable: true }
        compartment: { type: string, nullable: true }
        expectedQty: { type: number, nullable: true }
        actualQty: { type: number, nullable: true }
        variance: { type: number, nullable: true }
        verdict: { type: string, nullable: true, enum: [PASS, FAIL, HOLD, OK, DEFECTIVE, REPAIR] }
        putLightId: { type: string, nullable: true }
        status: { type: string, enum: [OPEN, CONFIRMED, CANCELLED] }
    PutInstruction:
      type: object
      properties:
        id: { type: string, format: uuid }
        destinationNodeId: { type: string, format: uuid }
        destinationDemandId: { type: string, format: uuid }
        orderRef: { type: string }
        orderLineId: { type: string, format: uuid, nullable: true }
        orderHuId: { type: string, format: uuid, nullable: true }
        putLightId: { type: string, nullable: true }
        qty: { type: number }
        confirmedQty: { type: number }
        status: { type: string, enum: [OPEN, CONFIRMED, SHORT, CANCELLED] }
    Workplace:
      type: object
      description: "A GTP station presented as an operator workplace, with whether it is currently in use."
      properties:
        id: { type: string, format: uuid }
        warehouseId: { type: string, format: uuid }
        code: { type: string }
        mode: { type: string, enum: [ORDER_LOCATION, PUT_WALL] }
        supportedModes:
          type: array
          items: { $ref: '#/components/schemas/OperatingMode' }
        status: { type: string }
        inUse: { type: boolean, description: "True when the workplace currently has an active operator session." }
        nodes:
          type: array
          items: { $ref: '#/components/schemas/Node' }
    WorkplaceSession:
      type: object
      description: "A claimed operator session plus the work context (the workplace it owns)."
      properties:
        sessionId: { type: string, format: uuid }
        stationId: { type: string, format: uuid }
        operator: { type: string, nullable: true }
        status: { type: string, enum: [ACTIVE, SUPERSEDED, RELEASED] }
        claimedAt: { type: string, format: date-time }
        lastHeartbeatAt: { type: string, format: date-time }
        workplace: { $ref: '#/components/schemas/Workplace' }
    SessionStatus:
      type: object
      description: "Whether a session still owns its workplace, and (if not) why it closed."
      properties:
        active: { type: boolean }
        reason: { type: string, nullable: true, enum: [superseded, released] }
    Error:
      type: object
      properties:
        error: { type: string }
