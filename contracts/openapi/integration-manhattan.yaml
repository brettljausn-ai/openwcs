openapi: 3.0.3
info:
  title: openWCS Manhattan Integration API
  version: 0.1.0
  description: >
    Host integration gateway / anti-corruption layer for Manhattan Active. Translates
    Manhattan-shaped orders and ASNs into the canonical openWCS Host API (resolving item ids to
    SKUs); the real Manhattan REST calls are wired later.
servers:
  - url: /api/integration/manhattan
    description: Via the API gateway

tags:
  - name: Orders

paths:
  /orders:
    post:
      tags: [Orders]
      summary: Translate a Manhattan order into the canonical Host API
      operationId: manhattanOrder
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ManhattanOrder' }
      responses:
        "200": { description: Accepted and forwarded }
        "422": { description: An item could not be resolved to a SKU }
  /asns:
    post:
      tags: [Orders]
      summary: Translate a Manhattan ASN into the canonical Host API
      operationId: manhattanAsn
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ManhattanAsn' }
      responses:
        "200": { description: Accepted and forwarded }
        "422": { description: An item could not be resolved to a SKU }

components:
  schemas:
    ManhattanLine:
      type: object
      properties:
        itemId: { type: string, description: Manhattan item id (resolved to a SKU code). }
        quantity: { type: number }
    ManhattanAddress:
      type: object
      properties:
        name: { type: string }
        addressLine1: { type: string }
        addressLine2: { type: string }
        city: { type: string }
        stateProvince: { type: string }
        postalCode: { type: string }
        countryCode: { type: string }
    ManhattanOrder:
      type: object
      required: [orderId, facilityId]
      properties:
        orderId: { type: string }
        facilityId: { type: string, format: uuid }
        customer: { type: string }
        serviceLevel: { type: string }
        route: { type: string }
        shipToAddress: { $ref: '#/components/schemas/ManhattanAddress' }
        orderLines:
          type: array
          items: { $ref: '#/components/schemas/ManhattanLine' }
    ManhattanAsn:
      type: object
      required: [asnId, facilityId]
      properties:
        asnId: { type: string }
        facilityId: { type: string, format: uuid }
        vendor: { type: string }
        asnLines:
          type: array
          items: { $ref: '#/components/schemas/ManhattanLine' }
