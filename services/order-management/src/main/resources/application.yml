server:
  port: 8084
spring:
  application:
    name: order-management
  # Service-local store (build.md §5.3): an isolated `orders` schema in dev.
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/openwcs}
    username: ${SPRING_DATASOURCE_USERNAME:openwcs}
    password: ${SPRING_DATASOURCE_PASSWORD:openwcs}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: orders
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    schemas: orders
    default-schema: orders
    create-schemas: true

openwcs:
  # Per-endpoint RBAC enforcement (build.md §4.8). Off by default (permits) so the stack runs
  # before a Keycloak realm exists; on, endpoints require the caller's X-Auth-Roles to grant
  # the coded permission. Match the gateway's flag.
  security:
    enabled: ${OPENWCS_SECURITY_ENABLED:false}
  orders:
    # Allocation service: pick-location allocation + cubing on release; reservation release on cancel.
    allocation-base-url: ${OPENWCS_ALLOCATION_BASE_URL:http://localhost:8091}
    # Transaction log: stock transactions posted beneath order lines are appended here.
    txlog-base-url: ${OPENWCS_TXLOG_BASE_URL:http://localhost:8086}
    # Master-data: validate an order's dispatch service/route codes against the catalogs.
    master-data-base-url: ${OPENWCS_MASTER_DATA_BASE_URL:http://localhost:8081}
    relay:
      enabled: true
      interval-ms: 1000
      batch-size: 100

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
