server:
  port: 8094
spring:
  application:
    name: gtp
  # Service-local store: an isolated `gtp` schema in dev.
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/openwcs}
    username: ${SPRING_DATASOURCE_USERNAME:openwcs}
    password: ${SPRING_DATASOURCE_PASSWORD:openwcs}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: gtp
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    schemas: gtp
    default-schema: gtp
    create-schemas: true

openwcs:
  # Per-endpoint RBAC (build.md §4.8); off by default so the stack runs before a Keycloak realm.
  security:
    enabled: ${OPENWCS_SECURITY_ENABLED:false}
  gtp:
    # Downstream write seams: flow-orchestrator (induction queue / DONE fan-out) and txlog
    # (broken-product stock write-offs). Bound from the OPENWCS_*_BASE_URL env so docker-compose
    # can override them. The return-to-storage decision is flow's (slotting decides there): gtp no
    # longer calls slotting or dispatches store-back transports.
    flow-base-url: ${OPENWCS_FLOW_ORCHESTRATOR_BASE_URL:http://localhost:8085}
    txlog-base-url: ${OPENWCS_TXLOG_BASE_URL:http://localhost:8086}
    # Work cycles resolve storage types from master-data (e.g. device family of a location).
    master-data-base-url: ${OPENWCS_MASTER_DATA_BASE_URL:http://localhost:8081}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
