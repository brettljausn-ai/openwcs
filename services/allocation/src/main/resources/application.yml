server:
  port: 8091
spring:
  application:
    name: allocation
  # Service-local store: an isolated `allocation` schema in dev.
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/openwcs}
    username: ${SPRING_DATASOURCE_USERNAME:openwcs}
    password: ${SPRING_DATASOURCE_PASSWORD:openwcs}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: allocation
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    schemas: allocation
    default-schema: allocation
    create-schemas: true

openwcs:
  # Per-endpoint RBAC (build.md §4.8); off by default so the stack runs before a Keycloak realm.
  security:
    enabled: ${OPENWCS_SECURITY_ENABLED:false}
  allocation:
    master-data-base-url: ${OPENWCS_MASTER_DATA_BASE_URL:http://localhost:8081}
    inventory-base-url: ${OPENWCS_INVENTORY_BASE_URL:http://localhost:8082}
    # Host integration gateway for per-shipper label barcodes. Left UNSET by default so a
    # simulator is used (dev/test). Set OPENWCS_ALLOCATION_HOST_LABEL_BASE_URL (e.g.
    # http://integration-sap:8089) to enable the real host call (see HttpHostLabelClient).

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
