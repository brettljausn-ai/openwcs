server:
  port: 8085
spring:
  application:
    name: flow-orchestrator
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/openwcs}
    username: ${SPRING_DATASOURCE_USERNAME:openwcs}
    password: ${SPRING_DATASOURCE_PASSWORD:openwcs}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: flow
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    schemas: flow
    default-schema: flow
    create-schemas: true

openwcs:
  # Per-endpoint RBAC (build.md §4.8); off by default so the stack runs before a Keycloak realm.
  security:
    enabled: ${OPENWCS_SECURITY_ENABLED:false}
  flow:
    # Device adapter base URLs by equipment family (build.md §8 uniform device contract). Keys are the
    # task family (uppercase) so they match DeviceTask.getFamily(); values are env-overridable so
    # compose can point them at the in-cluster adapter hostnames.
    adapters:
      CONVEYOR: ${OPENWCS_ADAPTER_CONVEYOR:http://localhost:9091}
      ASRS: ${OPENWCS_ADAPTER_ASRS:http://localhost:9096}
      AMR: ${OPENWCS_ADAPTER_AMR:http://localhost:9093}
      AUTOSTORE: ${OPENWCS_ADAPTER_AUTOSTORE:http://localhost:9094}
    # Single equipment-emulator: when HARDWARE_EMULATOR_ENABLED is on, every family is dispatched
    # here instead of to the per-family adapters above.
    emulator-url: ${OPENWCS_EMULATOR_URL:http://localhost:9097}
    # master-data base URL — read the hardware-emulator flag to choose emulator vs real adapters.
    master-data-base-url: ${OPENWCS_MASTER_DATA_BASE_URL:http://localhost:8081}
    # This service's own base URL, sent to the device as the async result-callback target.
    self-base-url: ${OPENWCS_FLOW_SELF_BASE_URL:http://localhost:8085}
    # gtp service base URL — projecting topology STOCK/ORDER interactions into station nodes.
    gtp-base-url: ${OPENWCS_GTP_BASE_URL:http://localhost:8094}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
