server:
  port: 8089
spring:
  application:
    name: integration-sap
openwcs:
  integration:
    # master-data catalog: the host route feed is upserted into the Route catalog (build.md §16).
    master-data-base-url: ${OPENWCS_MASTER_DATA_BASE_URL:http://localhost:8081}
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
